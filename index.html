<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>XROBO BLE — 자세 인식 Edition (ROI / 1초 주기)</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<!-- Tesseract.js (원본 유지) -->
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<!-- 자세 인식용 MediaPipe Pose -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<style>

/* === 전체화면 실행 시: 영상 크게, 로그 조금 작게 === */
#playOverlay .body{
  display:grid;
  grid-template-columns: minmax(0, 2.6fr) minmax(260px, 1fr);
  gap:0;
  height:100%;
}

/* 전체화면 카메라 래퍼 */
#playOverlay #ovCamWrap{
  position:relative;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 전체화면 카메라 영상 */
#playOverlay #ovCamWrap video#eyesCam{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  transform: scaleX(-1);
}

/* ★ 전체화면 자세 관절 오버레이 캔버스 */
#playOverlay #ovHandCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}

/* 오른쪽 전체화면 로그 패널 */
#playOverlay .ov-right-panel{
  display:flex;
  flex-direction:column;
  min-width:0;
  background:#0b0f14;
  border-left:1px solid #123;
}
#playOverlay .ov-header{
  padding:10px 12px;
  font-weight:600;
  color:#b7d7ff;
  border-bottom:1px solid #123;
}
#playOverlay .ov-log{
  flex:1 1 auto;
  overflow:auto;
  padding:10px 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:13px;
  line-height:1.4;
  color:#d3e6ff;
  background:#0b0f14;
}

/* 전체화면용 인식 투명 사각형 */
#ovCamWrap #ovFocusBox{
  position:absolute;
  left:50%;
  top:50%;
  width:70%;
  height:70%;
  max-width:90%;
  max-height:90%;
  transform: translate(-50%,-50%);
  border:2px solid rgba(255,255,255,.9);
  border-radius:10px;
  box-shadow:0 0 0 2px rgba(0,0,0,.25), 0 0 18px rgba(0,255,220,.35);
  pointer-events:none;
  z-index:1;
  opacity:.18;
}

/* 전체화면 배지 */
#ovCamWrap #overlayDigitBadge{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:12px;
  z-index:3;
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  font: 800 13px/1 system-ui;
  color:#fff;
  padding:.48rem .8rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
}
#overlayDigitBadge .label{
  opacity:.7;
  font-size:12px;
}
#overlayDigitBadge .value{
  font: 900 18px/1.1 ui-monospace, Menlo, Consolas, monospace;
  padding: 2px 8px;
  border-radius:8px;
  background: rgba(255,255,255,.12);
  box-shadow: 0 0 0 2px rgba(255,255,255,.18) inset;
}

@media (max-width:880px){
  #playOverlay .body{
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1.7fr) minmax(180px, .9fr);
  }
  #playOverlay .ov-right-panel{
    border-left:none;
    border-top:1px solid #123;
  }
}

#eyesStage{display:none !important;}

:root{
  --pad:10px;
  --uiScale: 1;
  --headerH: 64px;
  --btnH: 36px;
  --gap: 8px;
  --headerBgTop: #fff7ed;
  --headerBgBottom: #fffbeb;
  --headerBorder: #fed7aa;
  --logH: 180px;
  --blue: #1d4ed8;

  --handleWBase: 22;
  --handleHBase: 28;
  --triWBase:   14;
  --triHBase:   12;

  --handleW: calc(var(--handleWBase) * var(--uiScale) * 1px);
  --handleH: calc(var(--handleHBase) * var(--uiScale) * 1px);
  --triW:    calc(var(--triWBase)    * var(--uiScale) * 1px);
  --triH:    calc(var(--triHBase)    * var(--uiScale) * 1px);
  --linkBar: calc(3 * var(--uiScale) * 1px);

  --keyW: clamp(52px, 8vmin, 92px);
  --keyH: calc(var(--keyW) * 2.7);
  --keyGap: 6px;
  --keyFont: 14px;

  --eyesGap: 8vmin;
  --eyeSize: 42vmin;
  --pupilSize: 16vmin;
  --blinkSpeed: 180ms;
}
@media (max-width: 480px){
  :root{ --keyGap: 4px; --keyFont: 13px; }
}

*{ box-sizing:border-box; }
html, body{ height:100%; }
body{ margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fff; }

header{
  padding: 8px 12px;
  background: linear-gradient(180deg, var(--headerBgTop), var(--headerBgBottom));
  border-bottom: 1px solid var(--headerBorder);
  position:relative; z-index:10;
}
#topbar{
  display:flex;
  align-items:center;
  gap: calc(var(--gap) * var(--uiScale));
  flex-wrap: wrap;
}
.title{
  font-weight: 800;
  letter-spacing: .2px;
  color:#7c2d12;
  margin-right: 12px;
  font-size: calc(18px * var(--uiScale));
}
.spacer{ flex: 1 1 auto; }

.btn{
  height: calc(var(--btnH) * var(--uiScale));
  padding: 0 calc(12px * var(--uiScale));
  border:0;
  border-radius: calc(10px * var(--uiScale));
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size: calc(14px * var(--uiScale));
  font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  background:#f3f4f6;
  color:#111827;
  cursor:pointer;
  user-select:none;
}
.btn.small{
  height: calc(var(--btnH) * var(--uiScale) * .85);
  padding: 0 calc(10px * var(--uiScale));
  font-size: calc(12px * var(--uiScale));
}
#connectToggle{ background:#2563eb; color:#fff; }
#testBtn{ background:#0ea5e9; color:#fff; }
#runToggle{ background:#16a34a; color:#fff; }
#fsBtn{ background:#111827; color:#fff; }

.state{
  display:inline-flex;
  align-items:center;
  gap:calc(6px * var(--uiScale));
  height: calc(var(--btnH) * var(--uiScale));
  padding: 0 calc(6px * var(--uiScale));
  font-size: calc(12px * var(--uiScale));
}
.badgeDot{
  width: calc(22px * var(--uiScale));
  height: calc(22px * var(--uiScale));
  border-radius: 50%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size: calc(11px * var(--uiScale));
  font-weight:800;
  color:#fff;
  box-shadow: 0 0 0 calc(4px * var(--uiScale)) rgba(0,0,0,.06) inset;
}
.badgeDot.on{ background:#3b82f6; }
.badgeDot.off{ background:#ef4444; }

#main{
  display:flex;
  width:100%;
  height: calc(100vh - var(--headerH));
}
#left{
  position:relative;
  flex:1 1 auto;
  min-width:0;
  height:100%;
  display:flex;
  overflow:visible;
}
#blocklyDiv{
  flex:1 1 auto;
  min-width:0;
  height:100%;
  width:100%;
}

#right{
  flex:0 0 40%;
  display:flex;
  flex-direction:column;
  background:#fff;
  margin:8px 8px 8px 0;
  border:1px solid #e5e7eb;
  border-left:3px solid var(--blue);
  border-radius:12px 0 0 12px;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  overflow:hidden;
  position:relative;
}

#rightTop{
  flex:1 1 auto;
  border-bottom:1px solid #e5e7eb;
  min-height: 120px;
  background:#0b0f14;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 0;
  overflow:hidden;
}
.camWrap{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}
#camVideo{
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1);
  background:#000;
}

#handCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}

.camUi{
  position:absolute;
  right:12px;
  top:12px;
  display:flex;
  gap:8px;
  align-items:center;
  z-index:4;
  flex-wrap:wrap;
  max-width:95%;
  justify-content:flex-end;
}
.camBadge{
  font: 700 12px/1 system-ui;
  color:#fff;
  padding:.35rem .6rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.3);
  background:rgba(0,0,0,.35);
  backdrop-filter: blur(6px)
}

#focusBox{
  position:absolute;
  left:50%;
  top:50%;
  width:70%;
  height:70%;
  max-width:90%;
  max-height:90%;
  transform: translate(-50%,-50%);
  border:2px solid rgba(255,255,255,.9);
  border-radius:10px;
  box-shadow:0 0 0 2px rgba(0,0,0,.25), 0 0 18px rgba(0,255,220,.35);
  pointer-events:none;
  z-index:3;
  opacity:.15;
  transition: opacity .2s linear;
}

#digitReadout{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:12px;
  z-index:4;
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  font: 800 13px/1 system-ui;
  color:#fff;
  padding:.48rem .8rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
}
#digitReadout .value{
  font: 900 18px/1.1 ui-monospace, Menlo, Consolas, monospace;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,.12);
  box-shadow: 0 0 0 2px rgba(255,255,255,.18) inset;
}

#rightDivider{
  flex:0 0 6px;
  cursor: row-resize;
  background: repeating-linear-gradient(90deg, #d1d5db 0, #d1d5db 6px, #e5e7eb 6px, #e5e7eb 12px);
}

#rightBottom{
  flex: 0 0 var(--logH);
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
  padding: calc(10px * var(--uiScale));
  background:#0b0f14;
  color:#d1e4ff;
  border-top:1px solid #1f2937;
}
#log{
  flex:1 1 0;
  min-height:0;
  overflow:auto;
  white-space:pre-wrap;
  background:#0b0f14;
  border:1px solid #1f2937;
  border-radius: calc(8px * var(--uiScale));
  padding: calc(10px * var(--uiScale));
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: calc(12px * var(--uiScale));
  color:#d1e4ff;
}

#panelHandle{
  position:absolute;
  top: calc(12px * var(--uiScale));
  right: 0;
  z-index:999;
  width: var(--handleW);
  height: var(--handleH);
  background: var(--blue);
  border: 0;
  border-radius: calc(6px * var(--uiScale));
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  cursor: pointer;
  padding: 0;
}
#panelHandle::before{
  content:'';
  position:absolute;
  top:0;
  right: calc(0px - var(--linkBar));
  width: var(--linkBar);
  height:100%;
  background: var(--blue);
  border-top-right-radius: calc(6px * var(--uiScale));
  border-bottom-right-radius: calc(6px * var(--uiScale));
}
#panelHandle::after{
  content:'';
  position:absolute;
  top:50%;
  transform: translateY(-50%);
  width:0;
  height:0;
  border-style: solid;
}
#panelHandle.open::after{
  left: calc((var(--handleW) - var(--triW)) / 2);
  border-width: var(--triH) 0 var(--triH) var(--triW);
  border-color: transparent transparent transparent white;
}
#panelHandle.closed::after{
  left: calc((var(--handleW) - var(--triW)) / 2);
  border-width: var(--triH) var(--triW) var(--triH) 0;
  border-color: transparent white transparent transparent;
}
.blocklyZoom,.blocklyTrash{ display:block !important; }
.blocklyTrashLid, .blocklyTrashcanLid, .blocklyTrashCanLid { display:none !important; }

body.fs-active #main{ height: calc(100vh - var(--headerH)); }
body.panel-collapsed #right{ display:none; }
body.panel-collapsed #left{ flex:1 1 100%; }

#playOverlay{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:none;
  z-index:10000;
  touch-action:none;
  overscroll-behavior:contain;
  -webkit-tap-highlight-color:transparent;
}
#playOverlay.show{
  display:flex;
  flex-direction:column;
}

.dropdown{ position:relative; }
.dropdown .menu{
  position:absolute;
  right:0;
  top:calc(100% + 4px);
  display:none;
  min-width:140px;
  background:#ffffff;
  border:1px solid #d1d5db;
  border-radius:8px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  padding:6px;
  z-index:1000;
}
.dropdown .menu.show{ display:block; }
.dropdown .menu > button{
  width:100%;
  background:transparent;
  border:0;
  cursor:pointer;
  padding:8px 10px;
  border-radius:6px;
  font-size:calc(13px * var(--uiScale));
  text-align:left;
  color:#111827;
}
.dropdown .menu > button:hover{ background:#f3f4f6; }
#fileBtn{ background:#6b7280; color:#ffffff; }

:root{ --rightW: 40%; }
#hResizer{
  flex: 0 0 8px;
  background: linear-gradient(90deg,#e5e7eb,#d1d5db);
  border-left: 1px solid #cbd5e1;
  border-right: 1px solid #cbd5e1;
  cursor: col-resize;
  touch-action: none;
  margin: 8px 0;
}
body.hs-resizing,
body.hs-resizing *{
  cursor: col-resize !important;
  user-select: none !important;
}
#right{
  flex: 0 0 var(--rightW) !important;
  width: var(--rightW) !important;
  min-width: 0 !important;
}

#panelHandle { display: none !important; }

:root { --xroboKpScale: .7; }
#xrobo-kp4x4-v14{
  position:absolute;
  left:0;
  top:0;
  display:none;
  z-index:2147483647;
  background:#000;
  border:2px solid #000;
  border-radius:calc(16px * var(--xroboKpScale));
  padding: calc(12px * var(--xroboKpScale));
  box-shadow:0 16px 46px rgba(0,0,0,.45);
  user-select:none;
  touch-action:manipulation;
}
#xrobo-kp4x4-v14.show{ display:block; }
#xrobo-kp4x4-v14 .display{
  margin-bottom:calc(10px * var(--xroboKpScale));
  background:#0b0f14;
  color:#e5e7eb;
  border:1px solid #1f2937;
  border-radius:calc(10px * var(--xroboKpScale));
  padding:calc(10px * var(--xroboKpScale)) calc(12px * var(--xroboKpScale));
  font-weight:800;
  font-size:calc(18px * var(--xroboKpScale));
  letter-spacing:.6px;
  min-height:24px;
}
#xrobo-kp4x4-v14 .grid{
  display:grid;
  grid-template-columns: repeat(4, calc(56px * var(--xroboKpScale)));
  grid-auto-rows: calc(56px * var(--xroboKpScale));
  gap: calc(10px * var(--xroboKpScale));
}
#xrobo-kp4x4-v14 button{
  border:0;
  border-radius:calc(12px * var(--xroboKpScale));
  background:#fff;
  color:#111;
  font-weight:900;
  font-size:calc(20px * var(--xroboKpScale));
  box-shadow:0 calc(4px * var(--xroboKpScale)) calc(14px * var(--xroboKpScale)) rgba(0,0,0,.22);
  cursor:pointer;
}
#xrobo-kp4x4-v14 button:active{ transform:translateY(1px); }
#xrobo-kp4x4-v14 .op{ background:#e6eefc; color:#0b3aa6; font-weight:800; }
#xrobo-kp4x4-v14 .back{ background:#111827; color:#fff; font-size:calc(18px * var(--xroboKpScale)); }
#xrobo-kp4x4-v14 .clear{ background:#e5e7eb; color:#111827; font-size:calc(16px * var(--xroboKpScale)); font-weight:800; }
#xrobo-kp4x4-v14 .wide{ grid-column: span 2; height:calc(56px * var(--xroboKpScale)); font-size:calc(18px * var(--xroboKpScale)); font-weight:800; }
#xrobo-kp4x4-v14 .ok{ background:#2563eb; color:#fff; }
#xrobo-kp4x4-v14 .cancel{ background:#6b7280; color:#fff; }

#playOverlay .body{
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  height:100%;
  background:#000;
}
#ovRight{
  display:none !important;
}

/* 추가 UI */

<body>
<header id="appHeader">
  <div id="topbar">
    <div class="title">XROBO v5 — 자세 인식</div>
    <div class="spacer"></div>

    <div class="dropdown" id="fileDropdown">
      <button id="fileBtn" class="btn" title="파일">파일 ▾</button>
      <div id="fileMenu" class="menu" role="menu" aria-hidden="true">
        <button data-cmd="new" role="menuitem">새로만들기</button>
        <button data-cmd="save" role="menuitem">저장하기</button>
        <button data-cmd="load" role="menuitem">불러오기</button>
      </div>
    </div>

    <span class="state"><span id="statusDot" class="badgeDot off">off</span></span>
    <button id="connectToggle" class="btn">연결</button>
    <button id="testBtn" class="btn" title="코딩 화면에서 테스트 실행">테스트</button>
    <button id="runToggle" class="btn" title="전체화면 인식 실행">실행</button>
    <button id="fsBtn" class="btn" title="전체화면">전체화면</button>
  </div>
</header>

<div id="main">
  <div id="left">
    <div id="blocklyDiv"></div>
    <button id="panelHandle" class="open" title="실행창 닫기"></button>
  </div>

  <div id="hResizer" class="hsplit" title="좌우 크기 조절 바"></div>

  <div id="right">
    <div id="rightTop">
      <div class="camWrap" id="camWrap">

var SPEEDS=Array.from({length:41},(_,i)=>20-i).map(v=>[String(v),String(v)]);

const BASE_POSE_OPTIONS = [
  ["오른손 들기","P_RIGHT_HAND_UP"],
  ["왼손 들기","P_LEFT_HAND_UP"],
  ["만세","P_HANDS_UP"],
  ["양팔 벌리기","P_ARMS_OPEN"],
  ["하트","P_HEART"]
];

let customPoseEvents = [];
let customPoseCounter = 1;

function sanitizePoseName(name){
  return String(name||'').trim().replace(/\s+/g,' ').slice(0,24);
}
function makeUserPoseCode(){
  return 'P_USER_' + String(customPoseCounter++);
}
function getPoseDropdownOptions(){
  const arr = BASE_POSE_OPTIONS.slice();
  customPoseEvents.forEach(v=>arr.push([v.name, v.code]));
  return arr;
}
function refreshPoseDropdowns(){
  const opts = getPoseDropdownOptions();
  const valid = new Set(opts.map(v=>v[1]));
  ws.getAllBlocks(false).forEach(block=>{
    if(block.type !== 'xrobo_start') return;
    const field = block.getField('DIGIT');
    if(!field) return;
    field.menuGenerator_ = getPoseDropdownOptions;
    const cur = field.getValue();
    if(!valid.has(cur)) field.setValue('P_RIGHT_HAND_UP');
    if(block.rendered) block.render();
  });
  Blockly.svgResize(ws);
}
function addCustomPose(name, template, threshold){
  const clean = sanitizePoseName(name);
  if(!clean || !template) return null;
  const dup = customPoseEvents.find(v=>v.name===clean);
  if(dup){
    dup.template = template;
    dup.threshold = threshold;
    refreshPoseDropdowns();
    return dup;
  }
  const obj = {
    code: makeUserPoseCode(),
    name: clean,
    template: template,
    threshold: threshold || 0.18
  };
  customPoseEvents.push(obj);
  refreshPoseDropdowns();
  return obj;
}
function renameCustomPose(code, newName){
  const item = customPoseEvents.find(v=>v.code===code);
  if(!item) return false;
  const clean = sanitizePoseName(newName);
  if(!clean) return false;
  item.name = clean;
  refreshPoseDropdowns();
  return true;
}
function removeCustomPose(code){
  customPoseEvents = customPoseEvents.filter(v=>v.code!==code);
  refreshPoseDropdowns();
}

function numFromInput(parent, name, def){
  if (def===void 0) def=0;
  var raw = Blockly.JavaScript && Blockly.JavaScript.valueToCode
    ? Blockly.JavaScript.valueToCode(parent, name, Blockly.JavaScript.ORDER_NONE)
    : "";
  var n = Number(raw != null ? raw : '');
  return (isFinite(n) ? n : def);
}
function walkNode(b, list){
  if(!b) return;
  switch(b.type){
    case 'motor12_dd':{
      var v1=+b.getFieldValue('M1'), v2=+b.getFieldValue('M2'), ms=+b.getFieldValue('MS');
      list.push({type:'CMD',s:'M12 '+v1+' '+v2+' '+ms});
      if(ms>0) list.push({type:'W',args:[ms]});
      break;
    }
    case 'motor12_in':{
      var v1n=numFromInput(b,'M1',0), v2n=numFromInput(b,'M2',0), msn=numFromInput(b,'MS',0);
      list.push({type:'CMD',s:'M12 '+Math.round(v1n)+' '+Math.round(v2n)+' '+Math.round(msn)});
      if(msn>0) list.push({type:'W',args:[msn]});
      break;
    }
    case 'melody':{
      var p=b.getFieldValue('PITCH'), dur=numFromInput(b,'DUR',200), wait=numFromInput(b,'WAIT',0);
      list.push({type:'CMD',s:'MEL '+p+' '+Math.round(dur)+' '+Math.round(wait)});
      if(wait>0) list.push({type:'W',args:[wait]});
      break;
    }
    case 'led_ctrl':{
      var t=b.getFieldValue('TGT'), m=b.getFieldValue('MODE'), v=+b.getFieldValue('VAL');
      list.push({type:'CMD',s:'LED '+t+' '+m+' '+v});
      break;
    }
    case 'controls_repeat_ext':{
      var times=Math.max(0, numFromInput(b,'TIMES',1));
      var inner=[], first=b.getInputTargetBlock('DO');
      walkChain(first, inner);
      list.push({type:'FOR',count:times,body:inner});
      break;
    }
    case 'wait_seconds':{
      var s=numFromInput(b,'SEC',1);
      if(s>0) list.push({type:'W',args:[s*1000]});
      break;
    }
  }
}
function walkChain(start, list){
  for(var n=start; n; n=n.getNextBlock()) walkNode(n, list);
}
function normalizeProgram(list){
  var out=[];
  for(var i=0;i<list.length;i++){
    var ins=list[i];
    if(ins.type==='CMD'){
      var prev=out[out.length-1];
      if(prev && prev.type==='CMD' && prev.s===ins.s) continue;
    }else if(ins.type==='W'){
      if(!isFinite(ins.args && ins.args[0]) || ins.args[0]<=0) continue;
      var prevw=out[out.length-1];
      if(prevw && prevw.type==='W'){
        prevw.args[0]+=ins.args[0];
        continue;
      }
    }
    out.push(ins);
  }
  return out;
}
function buildEventPrograms(){
  const programs = {};
  getPoseDropdownOptions().forEach(v=>programs[v[1]]=[]);
  var evs = ws.getBlocksByType('xrobo_start', true);
  for(var i=0;i<evs.length;i++){
    var code = evs[i].getFieldValue('DIGIT') || 'P_RIGHT_HAND_UP';
    var chain = evs[i].getNextBlock();
    if(!chain) continue;
    var prog=[];
    walkChain(chain, prog);
    var norm = normalizeProgram(prog);
    if(!programs[code]) programs[code] = [];
    programs[code] = programs[code].concat(norm);
  }
  return programs;
}

function connectBLE(){
  if(!navigator.bluetooth){
    alert('이 브라우저는 Web Bluetooth 미지원입니다.');
    return;
  }
  (async function(){
    try{
      var dev = await navigator.bluetooth.requestDevice({
        filters:[{ namePrefix:'XROBO' }],
        optionalServices:[SERVICE_UUID, 0xFFF3, 0xFFF4]
      });
      try{
        if (bleDevice && bleDevice.removeEventListener){
          bleDevice.removeEventListener('gattserverdisconnected', onDisconnected);
        }
      }catch(e){}
      resetBleRefs();
      bleDevice=dev;
      if (bleDevice && bleDevice.addEventListener){
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      }

      bleServer=await bleDevice.gatt.connect();
      bleService=await bleServer.getPrimaryService(SERVICE_UUID);

      try{ writeChar=await bleService.getCharacteristic(0xFFF3);}catch(e){}
      try{ notifyChar=await bleService.getCharacteristic(0xFFF4);}catch(e){}
      if(!writeChar || notifyChar==null){
        var cs=await bleService.getCharacteristics();
        for(var i=0;i<cs.length;i++){
          var ch=cs[i], p=ch.properties||{};
          if(!writeChar && (p.write||p.writeWithoutResponse)) writeChar=ch;
          if(!notifyChar && p.notify) notifyChar=ch;
        }
      }
      if(!writeChar) throw new Error('write 특성을 찾지 못했습니다.');
      if(notifyChar){
        await notifyChar.startNotifications();
        if (notifyChar.addEventListener){
          notifyChar.addEventListener('characteristicvaluechanged',function(ev){
            try{
              var v=new TextDecoder().decode(ev.target.value||new Uint8Array());
              log('⬅️ '+v.trim());
            }catch(e){}
          });
        }
      }
      setConnected(true);
      log('✅ 연결: '+(dev.name||'(이름 없음)'));
    }catch(e){
      console.error(e);
      log('❌ 연결 실패: '+e);
      setConnected(false);
      resetBleRefs();
    }
  })();
}
function onDisconnected(){
  log('🔌 해제됨');
  setConnected(false);
  resetBleRefs();
}
function disconnectBLE(){
  try{
    if (bleDevice && bleDevice.gatt) bleDevice.gatt.disconnect();
  }catch(e){}
  setConnected(false);
  resetBleRefs();
}
btnConnect.onclick = ()=> isConnected ? disconnectBLE() : connectBLE();

function serializeProject(){
  var xmlDom = Blockly.Xml.workspaceToDom(ws);
  var xmlText = Blockly.Xml.domToText(xmlDom);
  return JSON.stringify({
    type:'xrobo_project_pose_v1',
    xml: xmlText,
    customPoseEvents: customPoseEvents
  }, null, 2);
}
function saveProject(){
  var data = serializeProject();
  var suggestedName = 'xrobo_project.json';
  if(window.showSaveFilePicker){
    (async function(){
      try{
        var handle = await showSaveFilePicker({
          suggestedName,
          types:[{description:'XROBO Project', accept:{'application/json':['.json']}}]
        });
        var stream = await handle.createWritable();
        await stream.write(new Blob([data], {type:'application/json'}));
        await stream.close();
        log('💾 저장 완료');
      }catch(e){
        if(!(e && e.name==='AbortError')) log('⚠️ 저장 실패: '+e);
      }
    })();
  }else{
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([data], {type:'application/json'}));
    a.download=suggestedName;
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); }, 1000);
    log('💾 저장(다운로드) 완료');
  }
}
function loadProject(){
  (async function(){
    try{
      var text='';
      if(window.showOpenFilePicker){
        var arr = await showOpenFilePicker({
          types:[{description:'XROBO Project', accept:{'application/json':['.json']}}]
        });
        var handle = arr[0];
        var file = await handle.getFile();
        text = await file.text();
      }else{
        var input=document.createElement('input');
        input.type='file';
        input.accept='.json,application/json';
        var pick = new Promise((res,rej)=>{
          input.onchange=()=>{ res(input.files[0]||null); };
          input.onerror=rej;
        });
        input.click();
        var file = await pick;
        if(!file) return;
        text = await file.text();
      }
      var obj = JSON.parse(text);
      if(!obj || (obj.type!=='xrobo_project_pose_v1' && obj.type!=='xrobo_project_v1')) throw new Error('알 수 없는 프로젝트 형식');
      ws.clear();
      customPoseEvents = Array.isArray(obj.customPoseEvents) ? obj.customPoseEvents : [];
      let maxN = 0;
      customPoseEvents.forEach(v=>{
        var m = /P_USER_(\d+)/.exec(v.code||'');
        if(m) maxN = Math.max(maxN, Number(m[1])||0);
      });
      customPoseCounter = maxN + 1;
      var parser = new DOMParser();
      var xml = parser.parseFromString(obj.xml, 'text/xml');
      Blockly.Xml.domToWorkspace(xml.documentElement, ws);
      refreshPoseDropdowns();
      log('📂 불러오기 완료');
    }catch(e){
      if(!(e && e.name==='AbortError')) alert('불러오기 실패: '+e);
    }
  })();
}

(function(){
  var divider = document.getElementById('rightDivider');
  var root = document.documentElement;
  var dragging=false, startY=0, startH=0, rightH=0;
  function pxToNum(px){ return Number(String(px).replace('px',''))||0; }
  function onDown(e){
    e.preventDefault();
    dragging=true;
    startY=('touches' in e ? e.touches[0].clientY : e.clientY);
    startH=pxToNum(getComputedStyle(root).getPropertyValue('--logH'));
    rightH=document.getElementById('right').clientHeight;
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive:false});
    window.addEventListener('mouseup', onUp, {once:true});
    window.addEventListener('touchend', onUp, {once:true});
  }
  function onMove(e){
    if(!dragging) return;
    var y=('touches' in e ? e.touches[0].clientY : e.clientY);
    if('touches' in e) e.preventDefault();
    var delta = startY - y;
    var nh = startH + delta;
    var minH=90, maxH=Math.max(130, Math.floor(rightH*0.8));
    nh=Math.min(maxH, Math.max(minH, nh));
    root.style.setProperty('--logH', nh+'px');
  }
  function onUp(){
    dragging=false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
  }
  divider.addEventListener('mousedown', onDown);
  divider.addEventListener('touchstart', onDown, {passive:false});
})();

function sendRaw(s){
  if(!writeChar){
    log('➡️(BLE 미연결) '+s);
    return Promise.resolve();
  }
  return writeChar.writeValue(enc(s+'\n'))
    .then(()=>{ log('➡️ '+s); })
    .catch(e=>{ log('⚠️ 전송 실패: '+e); });
}
async function runList(list, localToken){
  for(var i=0;i<list.length;i++){
    var ins=list[i];
    if(localToken !== cancelToken) return;
    if(ins.type==='CMD'){
      await sendRaw(ins.s);
    }else if(ins.type==='W'){
      var ms = (ins.args && ins.args[0]) ? ins.args[0] : 0;
      await new Promise(r=>setTimeout(r, ms));
    }else if(ins.type==='FOR'){
      for(var k=0;k<ins.count;k++){
        if(localToken !== cancelToken) return;
        await runList(ins.body, localToken);
      }
    }
  }
}
async function processQueue(localToken){
  if(queueBusy) return;
  queueBusy = true;
  try{
    while(queue.length && localToken === cancelToken){
      var item = queue.shift();
      await runList(item.list, localToken);
    }
  }finally{
    queueBusy = false;
  }
}

function eventLabelFromCode(code){
  switch(code){
    case 'P_RIGHT_HAND_UP': return '오른손 들기';
    case 'P_LEFT_HAND_UP':  return '왼손 들기';
    case 'P_HANDS_UP':      return '만세';
    case 'P_ARMS_OPEN':     return '양팔 벌리기';
    case 'P_HEART':         return '하트';
    default:
      var found = customPoseEvents.find(v=>v.code===code);
      return found ? found.name : String(code||'');
  }
}

function triggerEvent(name, conf, source){
  var poseLabel = eventLabelFromCode(name);

  if(!isRunning){
    log(`⏸ 실행 중이 아니라 이벤트를 실행하지 않습니다. (${poseLabel})`);
    return;
  }

  if(!eventPrograms || !eventPrograms[name]){
    try{ eventPrograms = buildEventPrograms(); }catch(e){}
  }
  var seq = eventPrograms[name];
  if(!seq || !seq.length){
    log(`⚠️ 이벤트 ${poseLabel} 에 연결된 블록이 없습니다.`);
    return;
  }

  if(typeof conf === 'number'){
    log(`③ 이벤트 ${poseLabel} 실행 (${seq.length}개 명령, ${conf.toFixed(1)}%)`);
  }else{
    log(`③ 이벤트 ${poseLabel} 실행 (${seq.length}개 명령)`);
  }

  queue.push({list: seq.slice()});
  var myToken = cancelToken;
  processQueue(myToken);
}

async function ensurePose(){
  if(poseReady) return;
  try{
    if(typeof Pose !== 'function'){
      throw new Error('MediaPipe Pose가 로드되지 않았습니다.');
    }
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults((res)=>{ poseLastResults = res; });
    poseWorker = pose;
    poseReady = true;
    log('🧍 자세 인식 준비 완료');
  }catch(e){
    log('❌ 자세 인식 초기화 실패: '+e);
  }
}

function getRoiRectFromFocus(video, fracW=0.85, fracH=0.9){
  const vw = Math.max(1, video.videoWidth || 640);
  const vh = Math.max(1, video.videoHeight|| 480);
  const rw = Math.round(vw * fracW);
  const rh = Math.round(vh * fracH);
  const x0 = Math.max(0, Math.floor((vw - rw)/2));
  const y0 = Math.max(0, Math.floor((vh - rh)/2));
  return { x:x0, y:y0, w:rw, h:rh, vw, vh };
}

const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[24,26],[26,28]
];

function resizeOverlayCanvas(canvas){
  if(!canvas) return;
  const parent = canvas.parentElement;
  if(!parent) return;
  const rect = parent.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(rect.width * dpr));
  const h = Math.max(1, Math.round(rect.height * dpr));
  if(canvas.width !== w || canvas.height !== h){
    canvas.width = w;
    canvas.height = h;
  }
}
function clearPoseOverlay(ctx, canvas){
  if(!ctx || !canvas) return;
  resizeOverlayCanvas(canvas);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
function computeContainRect(videoW, videoH, boxW, boxH){
  const videoAspect = videoW / videoH;
  const boxAspect = boxW / boxH;
  let drawW, drawH, offX, offY;
  if(videoAspect > boxAspect){
    drawW = boxW;
    drawH = drawW / videoAspect;
    offX = 0;
    offY = (boxH - drawH) / 2;
  }else{
    drawH = boxH;
    drawW = drawH * videoAspect;
    offY = 0;
    offX = (boxW - drawW) / 2;
  }
  return {x:offX, y:offY, w:drawW, h:drawH};
}
function computeCoverRect(videoW, videoH, boxW, boxH){
  const videoAspect = videoW / videoH;
  const boxAspect = boxW / boxH;
  let drawW, drawH, offX, offY;
  if(videoAspect > boxAspect){
    drawH = boxH;
    drawW = drawH * videoAspect;
    offX = (boxW - drawW) / 2;
    offY = 0;
  }else{
    drawW = boxW;
    drawH = drawW / videoAspect;
    offX = 0;
    offY = (boxH - drawH) / 2;
  }
  return {x:offX, y:offY, w:drawW, h:drawH};
}
function drawPoseOverlay(ctx, canvas, videoEl, landmarks, mode){
  if(!ctx || !canvas || !videoEl) return;
  resizeOverlayCanvas(canvas);
  const cw = canvas.width;
  const ch = canvas.height;
  ctx.clearRect(0,0,cw,ch);

  if(!landmarks || !landmarks.length || !videoEl.videoWidth || !videoEl.videoHeight) return;

  const dpr = window.devicePixelRatio || 1;
  const boxW = cw / dpr;
  const boxH = ch / dpr;
  let fit = (mode === 'contain')
    ? computeContainRect(videoEl.videoWidth, videoEl.videoHeight, boxW, boxH)
    : computeCoverRect(videoEl.videoWidth, videoEl.videoHeight, boxW, boxH);

  const roi = getRoiRectFromFocus(videoEl);
  const sx = fit.w / roi.w;
  const sy = fit.h / roi.h;
  const ox = fit.x;
  const oy = fit.y;

  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function mapPoint(p){
    const localX = p.x * roi.w;
    const localY = p.y * roi.h;
    const mirroredX = roi.w - localX;
    return {
      x: ox + mirroredX * sx,
      y: oy + localY * sy
    };
  }

  ctx.strokeStyle = 'rgba(0,255,220,0.95)';
  ctx.lineWidth = 4;
  for(const [a,b] of POSE_CONNECTIONS){
    const la = landmarks[a], lb = landmarks[b];
    if(!la || !lb) continue;
    if((la.visibility||0) < 0.35 || (lb.visibility||0) < 0.35) continue;
    const p1 = mapPoint(la);
    const p2 = mapPoint(lb);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  const drawIdx = [11,12,13,14,15,16,23,24,25,26,27,28];
  for(let i=0;i<drawIdx.length;i++){
    const idx = drawIdx[i];
    const lm = landmarks[idx];
    if(!lm || (lm.visibility||0) < 0.35) continue;
    const p = mapPoint(lm);
    ctx.beginPath();
    ctx.fillStyle = (idx===15 || idx===16) ? 'rgba(255,210,0,0.95)' : 'rgba(255,255,255,0.98)';
    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.fillStyle = 'rgba(0,120,255,0.95)';
    ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

async function runPoseOnVideo(video){
  if(!poseReady) return {status:'not-ready'};
  if(!video || !video.videoWidth || !video.videoHeight) return {status:'no-frame'};
  if(poseBusy) return {status:'busy'};

  poseBusy = true;
  try{
    poseLastResults = null;
    await poseWorker.send({ image: video });
    let r = poseLastResults;
    poseBusy = false;

    if(!r || !r.poseLandmarks){
      return {status:'no-body'};
    }
    return {
      status:'ok',
      landmarks: r.poseLandmarks
    };
  }catch(e){
    poseBusy = false;
    return {status:'error', error:e};
  }
}

function clamp01(v){ return Math.max(0, Math.min(1, v)); }
function avg(a,b){ return (a+b)/2; }

function normPoseTemplate(lm){
  if(!lm || !lm.length) return null;
  const ls=lm[11], rs=lm[12], lh=lm[23], rh=lm[24];
  if(!ls||!rs||!lh||!rh) return null;
  const cx = avg(ls.x, rs.x);
  const cy = avg(ls.y, rs.y);
  const shoulder = Math.hypot(rs.x-ls.x, rs.y-ls.y);
  const hipcx = avg(lh.x, rh.x), hipcy = avg(lh.y, rh.y);
  const torso = Math.hypot(hipcx-cx, hipcy-cy);
  const scale = Math.max(shoulder, torso, 0.08);
  const pick = [11,12,13,14,15,16,23,24];
  const pts = {};
  pick.forEach(i=>{
    if(!lm[i]) return;
    pts[i] = {
      x:(lm[i].x-cx)/scale,
      y:(lm[i].y-cy)/scale
    };
  });
  return { pts };
}
function poseDistance(a,b){
  if(!a||!b||!a.pts||!b.pts) return null;
  let sum=0,count=0;
  Object.keys(a.pts).forEach(k=>{
    if(!b.pts[k]) return;
    const p1=a.pts[k], p2=b.pts[k];
    sum += Math.hypot(p1.x-p2.x, p1.y-p2.y);
    count++;
  });
  if(count<4) return null;
  return sum/count;
}

function classifyBuiltInPose(lm){
  const ls=lm[11], rs=lm[12], le=lm[13], re=lm[14], lw=lm[15], rw=lm[16];
  if(!ls||!rs||!le||!re||!lw||!rw) return null;

  const shoulderY = avg(ls.y, rs.y);
  const shoulderSpan = Math.abs(rs.x - ls.x);
  const rightUp = rw.y < rs.y - 0.08 && lw.y > ls.y - 0.03;
  const leftUp  = lw.y < ls.y - 0.08 && rw.y > rs.y - 0.03;
  const bothUp  = rw.y < rs.y - 0.08 && lw.y < ls.y - 0.08;
  const armsOpen = Math.abs(rw.x-lw.x) > shoulderSpan * 1.7 &&
                   Math.abs(rw.y - shoulderY) < 0.10 &&
                   Math.abs(lw.y - shoulderY) < 0.10;

  const wristClose = Math.hypot(rw.x-lw.x, rw.y-lw.y) < shoulderSpan * 0.42;
  const elbowsIn = Math.abs(re.x-le.x) < shoulderSpan * 0.85;
  const heart = wristClose &&
                lw.y < shoulderY + 0.05 && rw.y < shoulderY + 0.05 &&
                elbowsIn;

  if(heart) return { code:'P_HEART', label:'하트', conf:88 };
  if(bothUp) return { code:'P_HANDS_UP', label:'만세', conf:92 };
  if(rightUp) return { code:'P_RIGHT_HAND_UP', label:'오른손 들기', conf:86 };
  if(leftUp) return { code:'P_LEFT_HAND_UP', label:'왼손 들기', conf:86 };
  if(armsOpen) return { code:'P_ARMS_OPEN', label:'양팔 벌리기', conf:84 };
  return null;
}

function classifyCustomPose(lm){
  if(!customPoseEvents.length) return null;
  const cur = normPoseTemplate(lm);
  if(!cur) return null;
  let best = null;
  customPoseEvents.forEach(item=>{
    const d = poseDistance(cur, item.template);
    if(d==null) return;
    const th = item.threshold || 0.18;
    if(d <= th){
      const conf = Math.max(60, Math.min(99, 99 - (d/th)*39));
      if(!best || d < best.d){
        best = { code:item.code, label:item.name, conf:conf, d:d };
      }
    }
  });
  return best;
}

function classifyPose(lm){
  const user = classifyCustomPose(lm);
  if(user) return user;
  return classifyBuiltInPose(lm);
}

function describeNoPoseReason(res){
  if(!res || typeof res.status!=='string') return '인식 실패';
  switch(res.status){
    case 'no-body': return '사람이 보이지 않음';
    case 'no-frame': return '카메라 프레임 없음';
    case 'not-ready': return '자세 인식 준비중';
    case 'busy': return '이전 인식 처리중';
    case 'error': return '자세 인식 오류';
    default: return '인식 실패';
  }
}

function handleDigitPipeline(res, source){
  const prefix = (source === 'overlay') ? '[전체화면]' : '[카메라]';

  if(source === 'panel'){
    panelLandmarks = (res && res.landmarks) ? res.landmarks : null;
  }else if(source === 'overlay'){
    overlayLandmarks = (res && res.landmarks) ? res.landmarks : null;
  }

  if(!res || res.status==='busy' || res.status==='not-ready' || res.status==='no-frame'){
    return;
  }

  if(res.status !== 'ok' || !res.landmarks){
    if(source === 'panel') updateDigitReadout(null);
    const reason = describeNoPoseReason(res);
    if(lastStateKey !== 'NONE'){
      lastStateKey = 'NONE';
      log(`${prefix} ① 자세 인식: 없음 (${reason})`);
    }
    return;
  }

  const g = classifyPose(res.landmarks);
  const currentKey = g ? String(g.code) : 'NONE';
  if(currentKey === lastStateKey) return;
  lastStateKey = currentKey;

  if(!g){
    if(source === 'panel') updateDigitReadout(null);
    log(`${prefix} ① 자세 인식: 없음 (정의된 자세가 아님)`);
    return;
  }

  const label = g.label;
  const conf  = g.conf || 0;
  if(source === 'panel') updateDigitReadout(label);

  log(`${prefix} ① 자세 인식: ${label} (${conf.toFixed(1)}%)`);
  log(`${prefix} ② 이벤트 확인중: ${label}`);

  if(conf < EVENT_CONF_MIN){
    log(`${prefix} ⚠️ 신뢰도 ${conf.toFixed(1)}% 로 ${EVENT_CONF_MIN}% 미만이라 이벤트를 실행하지 않습니다.`);
    return;
  }

  if(!creatingPose){
    triggerEvent(String(g.code), conf, source);
  }
}

function startDetectLoop(){
  panelLastDetectTs = 0;
  if(focusBox){
    focusBox.style.left='50%';
    focusBox.style.top ='50%';
    focusBox.style.opacity='.18';
  }

  const step = async ()=>{

  creatingPose = true;
  try{
    if(!camOn){
      await startCam();
      if(!camOn){ creatingPose = false; return; }
    }
    await ensurePose();

    const samples = [];
    for(let i=1;i<=3;i++){
      showCapture('자세를 취하세요', `같은 자세를 유지해 주세요.\n${i}/3 캡쳐`, '3');
      await sleep(800);
      showCapture('자세를 취하세요', `${i}/3 캡쳐`, '2');
      await sleep(800);
      showCapture('자세를 취하세요', `${i}/3 캡쳐`, '1');
      await sleep(800);

      const t = await captureCurrentTemplate();
      if(!t){
        hideCapture();
        alert('자세를 찾지 못했습니다. 다시 시도해 주세요.');
        creatingPose = false;
        return;
      }
      samples.push(t);
      showCapture('찰칵!', `${i}/3 캡쳐 완료`, '📸');
      await sleep(600);
    }

    const avgTemplate = averageTemplates(samples);
    hideCapture();

    const name = await openNameModal('');
    if(!name){
      creatingPose = false;
      return;
    }

    const item = addCustomPose(name, avgTemplate, 0.18);
    eventPrograms = buildEventPrograms();
    if(item){
      alert('새 자세 이벤트가 생성되었습니다: ' + item.name);
      log('✅ 사용자 자세 생성: ' + item.name);
    }
  }catch(e){
    hideCapture();
    alert('자세 만들기 오류: ' + e);
    log('❌ 자세 만들기 오류: ' + e);
  }finally{
    creatingPose = false;
  }
}
function averageTemplates(list){
  if(!list || !list.length) return null;
  const keys = [11,12,13,14,15,16,23,24];
  const out = { pts:{} };
  keys.forEach(k=>{
    let sx=0, sy=0, c=0;
    list.forEach(t=>{
      if(!t || !t.pts || !t.pts[k]) return;
      sx += t.pts[k].x;
      sy += t.pts[k].y;
      c++;
    });
    if(c>0){
      out.pts[k] = { x:sx/c, y:sy/c };
    }
  });
  return out;
}

(function(){
  var res = document.getElementById('hResizer');
  var main = document.getElementById('main');
  var right = document.getElementById('right');
  if(!res || !main || !right) return;

  var dragging = false;
  var startX = 0;
  var startW = 0;
  var rafId = 0;
  var maxW = 0;

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function computeMax(){
    var rect = main.getBoundingClientRect();
    var barW = res.getBoundingClientRect().width || 8;
    maxW = Math.max(0, rect.width - barW);
    return maxW;
  }

  function onDown(clientX){
    dragging = true;
    startX = clientX;
    startW = right.getBoundingClientRect().width;
    computeMax();
    document.body.classList.add('hs-resizing');
  }

  function applyWidth(newW){
    newW = clamp(newW, 0, maxW);
    document.documentElement.style.setProperty('--rightW', newW + 'px');
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function(){
      try{
        if (window.Blockly && typeof Blockly.svgResize==='function' && window.ws){
          Blockly.svgResize(ws);
        }
      }catch(e){}
    });
  }

  function onMove(clientX){
    if(!dragging) return;
    var dx = clientX - startX;
    var newW = startW - dx;
    applyWidth(newW);
  }

  function onUp(){
    dragging = false;
    document.body.classList.remove('hs-resizing');
  }

  res.addEventListener('mousedown', function(e){
    e.preventDefault();
    onDown(e.clientX);
  });
  window.addEventListener('mousemove', function(e){ onMove(e.clientX); });
  window.addEventListener('mouseup', onUp);

  res.addEventListener('touchstart', function(e){
    if(!e.touches || !e.touches[0]) return;
    e.preventDefault();
    onDown(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchmove', function(e){
    if(!e.touches || !e.touches[0]) return;
    onMove(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchend', onUp);

  document.body.classList.remove('panel-collapsed');

  window.addEventListener('resize', function(){
    var cur = right.getBoundingClientRect().width;
    var mx = computeMax();
    if(cur > mx) applyWidth(mx);
  });
})();

(function(){
  if(!/Android/i.test(navigator.userAgent||'')) { return; }

  'use strict';
  const isAndroid = /Android/i.test(navigator.userAgent||'');
  if(!isAndroid){ return; }
  const hasPointer = 'PointerEvent' in window;

  let pad, disp, grid;
  let activeInput = null;
  let activeField = null;
  let promptCallback = null;
  let buffer = '';
  let rafId = 0;
  let lastAnchor = {x: window.innerWidth/2, y: 140};
  let outsideBound = false;
  let committing = false;

  let lastPressLabel = '';
  let lastPressTime = 0;
  const PRESS_DEBOUNCE_MS = 160;

  function safeEval(expr){
    if(typeof expr!=='string') return NaN;
    expr = expr.replace(/[^0-9+\-*/\s]/g,'').trim();
    if(!expr) return NaN;
    const tokens = expr.match(/(\d+|[+\-*/])/g) || [];
    if(tokens.length===0) return NaN;
    const values=[], ops=[]; let expectNum=true, unary=null;
    function prec(op){ return (op==='*'||op==='/')?2:1; }
    function apply(){
      const op=ops.pop(), b=values.pop(), a=values.pop();
      values.push(op==='+'?a+b: op==='-'?a-b: op==='*'?a*b: (b===0?0:Math.trunc(a/b)));
    }
    for(const tk of tokens){
      if(/^\d+$/.test(tk)){
        let v=parseInt(tk,10);
        if(unary==='-') v=-v;
        unary=null;
        values.push(v);
        expectNum=false;
      }else{
        if(expectNum){
          if(tk==='+'||tk==='-') unary=tk;
        }else{
          while(ops.length && prec(ops[ops.length-1])>=prec(tk)) apply();
          ops.push(tk);
          expectNum=true;
        }
      }
    }
    while(ops.length) apply();

  }

    document.body.appendChild(pad);
    disp = pad.querySelector('.display');
    grid = pad.querySelector('.grid');

    const layout = [
      {t:'1'},{t:'2'},{t:'3'},{t:'←',cls:'back'},
      {t:'4'},{t:'5'},{t:'6'},{t:'C',cls:'clear'},
      {t:'7'},{t:'8'},{t:'9'},{t:'+',cls:'op'},
      {t:'*',cls:'op'},{t:'0'},{t:'/',cls:'op'},{t:'-',cls:'op'},
      {t:'확인',cls:'wide ok'},{t:'취소',cls:'wide cancel'}
    ];
    layout.forEach(k=>{
      const b=document.createElement('button');
      b.type='button';
      b.textContent=k.t;
      if(k.cls) k.cls.split(' ').forEach(c=>b.classList.add(c));
      grid.appendChild(b);
    });

    const press = (label)=>{
      const now = performance.now();
      if(label === lastPressLabel && (now - lastPressTime) < PRESS_DEBOUNCE_MS){
        return;
      }
      lastPressLabel = label;
      lastPressTime = now;

      if(label==='확인'){ commit(); return; }
      if(label==='취소'){ cancel(); return; }
      if(label==='C'){ buffer=''; sync(); return; }
      if(label==='←'){ buffer = buffer.slice(0, buffer.length-1); sync(); return; }
      if(/^[0-9+\-*/]$/.test(label)){ buffer += label; sync(); return; }

      return e.target && e.target.closest && e.target.closest('button');

    const onPress = (e)=>{
      const btn = getButtonFromEvent(e);
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      press(btn.textContent);
    };

    if(!grid.dataset.bound){
      if(hasPointer){
        grid.addEventListener('pointerdown', onPress, true);
      }else if('ontouchstart' in window){
        grid.addEventListener('touchstart', onPress, {passive:false, capture:true});
      }else{
        grid.addEventListener('mousedown', onPress, true);
      }
      grid.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
      }, true);
      grid.dataset.bound = '1';
    }

    const outside = (e)=>{
      if(!pad.classList.contains('show')) return;
      if(pad.contains(e.target)) return;

    }

    return pad;
  }

  function showPad(){ buildPad().classList.add('show'); }
  function hidePad(){ if(pad) pad.classList.remove('show'); }

  function positionNearRect(r){
    const br = pad.getBoundingClientRect();
    const pw=br.width, ph=br.height;
    const gap=8, vx=window.scrollX||0, vy=window.scrollY||0;

    showPad();
    if(!positionNearField(field)){
      positionNearPoint(lastAnchor.x, lastAnchor.y);
    }
    sync();
  }

  function openForPrompt(defVal, anchor){
    activeInput = null;
    activeField = null;
    buffer = String(defVal||'');
    showPad();
    positionNearPoint(anchor.x, anchor.y);
    sync();
  }

  function afterEditorOpened(field){
    let found = false;
    const adopt = ()=>{
      const input = findBlocklyInput();
      if(input){
        if(!pad || !pad.classList.contains('show')) showPad();
        openForInput(input, field);
        found = true;
        return true;
      }
      return false;
    };
    if(adopt()) return;
    openForField(field);
    let tries = 0;
    const iv=setInterval(()=>{
      if(adopt() || ++tries>8) clearInterval(iv);
    },50);
  }

  function patchFieldNumber(){
    try{
      if(!window.Blockly || !Blockly.FieldNumber || Blockly.FieldNumber.__xrobo_v14) return;
      function wrap(name){
        const orig = Blockly.FieldNumber.prototype[name];
        if(!orig) return false;
        Blockly.FieldNumber.prototype[name] = function(){
          const rv = orig.apply(this, arguments);
          const self = this;
          setTimeout(()=> afterEditorOpened(self), 0);
          return rv;
        };
        return true;
      }
      wrap('showEditor_') || wrap('showEditor');
      Blockly.FieldNumber.__xrobo_v14 = true;
    }catch(_){}
  }

  function patchFieldTextInput(){
    try{
      if(!window.Blockly || !Blockly.FieldTextInput || Blockly.FieldTextInput.__xrobo_v14) return;
      const proto = Blockly.FieldTextInput.prototype;
      const origShow = proto.showEditor_;
      proto.showEditor_ = function(opt_e){
        const rv = origShow ? origShow.apply(this, arguments) : undefined;
        if((typeof Blockly.FieldNumber!=='undefined') && (this instanceof Blockly.FieldNumber)){
          const self = this;
          setTimeout(()=> afterEditorOpened(self), 0);
        }
        return rv;
      };
      const origPrompt = proto.showPromptEditor_;
      if(typeof origPrompt === 'function'){
        proto.showPromptEditor_ = function(){
          if((typeof Blockly.FieldNumber!=='undefined') && (this instanceof Blockly.FieldNumber)){
            openForPrompt(this.getValue ? this.getValue() : '', lastAnchor);
            return;
          }
          return origPrompt.apply(this, arguments);
        };
      }
      Blockly.FieldTextInput.__xrobo_v14 = true;
    }catch(_){}
  }

  function patchPrompt(){
    try{
      if(!window.Blockly) return;
      const numLike = v => /^[\s]*[+\-]?\d+(?:[\s]*[+\-*/][\s]*[+\-]?\d+)*[\s]*$/.test(String(v||''));
      if(Blockly.dialog && typeof Blockly.dialog.setPrompt==='function' && !Blockly.dialog.__xrobo_v14){
        Blockly.dialog.setPrompt(function(msg, defVal, cb){
          const looksNumeric = numLike(defVal) || /value|값|number|숫자/i.test(String(msg||''));
          if(looksNumeric){
            promptCallback = v => { try{ cb(v); }catch(_){ } };
            openForPrompt(defVal, lastAnchor);
          }else{
            const ans = window.prompt(String(msg||''), String(defVal||''));
            try{ cb(ans); }catch(_){}
          }
        });
        Blockly.dialog.__xrobo_v14 = true;
      }else if(!Blockly.__xrobo_prompt_v14){
        const old = Blockly.prompt;
        Blockly.prompt = function(message, defaultValue, callback){
          const looksNumeric = numLike(defaultValue) || /value|값|number|숫자/i.test(String(message||''));
          if(looksNumeric){
            promptCallback = v=>{ try{ callback(v); }catch(_){ }};
            openForPrompt(defaultValue, lastAnchor);
          }else{
            return old ? old.apply(this, arguments) : window.prompt(message, defaultValue);
          }
        };
        Blockly.__xrobo_prompt_v14 = true;
      }
    }catch(_){}
  }

  document.addEventListener('focusin', function(e){
    const t = e.target;
    if(!t) return;
    if(t.classList && (t.classList.contains('blocklyHtmlInput') ||
                       t.classList.contains('blocklyHtmlTextInput'))){
      openForInput(t, null);
      const onBlur = ()=>{ try{ commit(); }catch(_){ cancel(); } t.removeEventListener('blur', onBlur); };
      t.addEventListener('blur', onBlur);
    }
  }, true);

  (function(){
    if(!/Android/i.test(navigator.userAgent||'')) { return; }
    const root = document.getElementById('blocklyDiv') || document.body;
    const savePt = (e)=>{ lastAnchor = {x:e.clientX, y:e.clientY}; };
    if(hasPointer){
      root.addEventListener('pointerdown', savePt, true);
    }else{
      root.addEventListener('mousedown', savePt, true);
      root.addEventListener('touchstart', (e)=>{
        if(e.touches&&e.touches[0]) lastAnchor={x:e.touches[0].clientX, y:e.touches[0].clientY};
      }, {capture:true, passive:true});
    }
  })();

  function tryPatch(){ patchFieldNumber(); patchFieldTextInput(); patchPrompt(); }
  if(document.readyState==='complete' || document.readyState==='interactive'){
    tryPatch();
  }else{
    window.addEventListener('DOMContentLoaded', tryPatch);
  }
  let tries=0;
  const iv=setInterval(()=>{ tryPatch(); if(++tries>12) clearInterval(iv); }, 300);
})();

refreshPoseDropdowns();
eventPrograms = buildEventPrograms();
</script>
