<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>XROBO BLE — 사람 관절 인식 Edition</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<style>
  :root{
    --headerH:64px;
    --logH:180px;
    --rightW:40%;
    --uiScale:1;
    --blue:#1d4ed8;
    --headerBgTop:#fff7ed;
    --headerBgBottom:#fffbeb;
    --headerBorder:#fed7aa;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#fff; }

  header{
    padding:8px 12px;
    background:linear-gradient(180deg,var(--headerBgTop),var(--headerBgBottom));
    border-bottom:1px solid var(--headerBorder);
  }
  #topbar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .title{
    font-weight:800; color:#7c2d12; margin-right:12px;
    font-size:18px;
  }
  .spacer{ flex:1 1 auto; }
  .btn{
    height:36px; padding:0 12px; border:0; border-radius:10px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    background:#f3f4f6; color:#111827;
  }
  .btn.small{ height:30px; padding:0 10px; font-size:12px; }
  #connectToggle{ background:#2563eb; color:#fff; }
  #testBtn{ background:#0ea5e9; color:#fff; }
  #runToggle{ background:#16a34a; color:#fff; }
  #fsBtn{ background:#111827; color:#fff; }

  .state{
    display:inline-flex; align-items:center; gap:6px; height:36px;
    padding:0 6px; font-size:12px;
  }
  .badgeDot{
    width:22px; height:22px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#fff;
    box-shadow:0 0 0 4px rgba(0,0,0,.06) inset;
  }
  .badgeDot.on{ background:#3b82f6; }
  .badgeDot.off{ background:#ef4444; }

  #main{
    display:flex; width:100%; height:calc(100vh - var(--headerH));
  }
  #left{
    flex:1 1 auto; min-width:0; height:100%; display:flex;
  }
  #blocklyDiv{
    width:100%; height:100%;
  }
  #hResizer{
    flex:0 0 8px;
    background:linear-gradient(90deg,#e5e7eb,#d1d5db);
    border-left:1px solid #cbd5e1;
    border-right:1px solid #cbd5e1;
    cursor:col-resize;
    touch-action:none;
    margin:8px 0;
  }
  #right{
    flex:0 0 var(--rightW);
    width:var(--rightW);
    min-width:0;
    display:flex; flex-direction:column;
    background:#fff;
    margin:8px 8px 8px 0;
    border:1px solid #e5e7eb;
    border-left:3px solid var(--blue);
    border-radius:12px 0 0 12px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
    overflow:hidden;
  }
  #rightTop{
    flex:1 1 auto;
    min-height:120px;
    border-bottom:1px solid #e5e7eb;
    background:#0b0f14;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .camWrap{
    position:relative;
    width:100%; height:100%;
    background:#000;
    display:flex; align-items:center; justify-content:center;
  }
  #camVideo, #eyesCam{
    width:100%; height:100%;
    object-fit:cover;
    background:#000;
    transform:scaleX(-1);
  }
  #guideCanvas, #ovGuideCanvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:2;
  }
  .camUi{
    position:absolute;
    left:50%; top:10px; transform:translateX(-50%);
    width:min(92%,860px);
    z-index:4;
  }
  .camToolbar{
    display:flex; flex-wrap:wrap; gap:8px;
    align-items:center; justify-content:center;
    padding:8px 10px;
    border-radius:14px;
    background:rgba(0,0,0,.30);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(8px);
  }
  .camBadge{
    font:700 12px/1 system-ui;
    color:#fff;
    padding:.35rem .6rem;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.08);
  }
  .sliderGroup{
    display:flex; align-items:center; gap:6px; min-width:150px;
  }
  .sliderGroup label{
    font-size:11px; white-space:nowrap; color:#fff; opacity:.92;
  }
  .sliderGroup input[type="range"]{ width:92px; }
  .sliderVal{
    min-width:28px; text-align:right; font-size:11px;
    color:#fde68a; font-weight:800;
  }

  #digitReadout, #overlayDigitBadge{
    position:absolute;
    left:50%; transform:translateX(-50%);
    bottom:12px;
    z-index:4;
    display:inline-flex; align-items:center; gap:.55rem;
    font:800 13px/1 system-ui;
    color:#fff;
    padding:.48rem .8rem;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
  }
  #digitReadout .value, #overlayDigitBadge .value{
    font:900 18px/1.1 ui-monospace, Menlo, Consolas, monospace;
    padding:2px 8px;
    border-radius:8px;
    background:rgba(255,255,255,.12);
    box-shadow:0 0 0 2px rgba(255,255,255,.18) inset;
  }

  #rightDivider{
    flex:0 0 6px;
    cursor:row-resize;
    background:repeating-linear-gradient(90deg,#d1d5db 0,#d1d5db 6px,#e5e7eb 6px,#e5e7eb 12px);
  }
  #rightBottom{
    flex:0 0 var(--logH);
    display:flex; flex-direction:column; min-height:0;
    overflow:hidden;
    padding:10px;
    background:#0b0f14; color:#d1e4ff;
    border-top:1px solid #1f2937;
  }
  #log{
    flex:1 1 0; min-height:0; overflow:auto; white-space:pre-wrap;
    background:#0b0f14; border:1px solid #1f2937; border-radius:8px;
    padding:10px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:12px; color:#d1e4ff;
  }

  .dropdown{ position:relative; }
  .dropdown .menu{
    position:absolute; right:0; top:calc(100% + 4px);
    display:none; min-width:140px;
    background:#fff; border:1px solid #d1d5db; border-radius:8px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    padding:6px; z-index:1000;
  }
  .dropdown .menu.show{ display:block; }
  .dropdown .menu > button{
    width:100%; background:transparent; border:0; cursor:pointer;
    padding:8px 10px; border-radius:6px; font-size:13px; text-align:left;
    color:#111827;
  }
  .dropdown .menu > button:hover{ background:#f3f4f6; }
  #fileBtn{ background:#6b7280; color:#fff; }

  #playOverlay{
    position:fixed; inset:0; background:#000; color:#fff;
    display:none; z-index:10000;
  }
  #playOverlay.show{ display:block; }
  #ovCamWrap{
    position:relative; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }

  .poseCaptureOverlay{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    pointer-events:none;
    z-index:6;
    background:rgba(0,0,0,.18);
  }
  .poseCaptureOverlay.show{ display:flex; }
  .poseCaptureBox{
    min-width:240px;
    max-width:min(90vw,540px);
    padding:20px 24px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.48);
    color:#fff;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    backdrop-filter:blur(10px);
  }
  .poseCaptureTitle{
    font-size:18px;
    font-weight:800;
    margin-bottom:8px;
  }
  .poseCaptureSub{
    font-size:13px;
    opacity:.9;
    margin-bottom:14px;
  }
  .poseCaptureCount{
    font-size:64px;
    line-height:1;
    font-weight:900;
    color:#fde68a;
    text-shadow:0 4px 18px rgba(0,0,0,.35);
    min-height:72px;
  }

  .nameModal{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    z-index:20000; background:rgba(0,0,0,.45);
  }
  .nameModal.show{ display:flex; }
  .nameModalCard{
    width:min(92vw,420px);
    background:#fff;
    color:#111827;
    border-radius:18px;
    box-shadow:0 24px 60px rgba(0,0,0,.22);
    padding:20px;
  }
  .nameModalCard h3{
    margin:0 0 10px 0;
    font-size:20px;
  }
  .nameModalCard p{
    margin:0 0 12px 0;
    font-size:14px;
    color:#4b5563;
  }
  .nameModalCard input{
    width:100%;
    height:42px;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:0 12px;
    font-size:15px;
    outline:none;
  }
  .nameModalCard input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
  }
  .nameModalActions{
    display:flex; justify-content:flex-end; gap:8px; margin-top:14px;
  }
  .nameModalActions .ok{ background:#2563eb; color:#fff; }
  .nameModalActions .cancel{ background:#e5e7eb; color:#111827; }

  @media (max-width:880px){
    .camToolbar{ gap:6px; padding:6px 8px; }
    .sliderGroup{ min-width:126px; }
    .sliderGroup input[type="range"]{ width:78px; }
  }
</style>
</head>
<body>
<header id="appHeader">
  <div id="topbar">
    <div class="title">XROBO v5 — 사람 관절 인식</div>
    <div class="spacer"></div>

    <div class="dropdown" id="fileDropdown">
      <button id="fileBtn" class="btn">파일 ▾</button>
      <div id="fileMenu" class="menu">
        <button data-cmd="new">새로만들기</button>
        <button data-cmd="save">저장하기</button>
        <button data-cmd="load">불러오기</button>
      </div>
    </div>

    <span class="state"><span id="statusDot" class="badgeDot off">off</span></span>
    <button id="connectToggle" class="btn">연결</button>
    <button id="testBtn" class="btn">테스트</button>
    <button id="runToggle" class="btn">실행</button>
    <button id="fsBtn" class="btn">전체화면</button>
  </div>
</header>

<div id="main">
  <div id="left">
    <div id="blocklyDiv"></div>
  </div>

  <div id="hResizer"></div>

  <div id="right">
    <div id="rightTop">
      <div class="camWrap" id="camWrap">
        <video id="camVideo" playsinline autoplay muted></video>
        <canvas id="guideCanvas"></canvas>

        <div class="camUi">
          <div class="camToolbar">
            <span id="camBadge" class="camBadge">Cam: off</span>
            <button id="camToggle" class="btn small">캠 켜기</button>
            <button id="poseFindBtn" class="btn small" style="background:#22c55e;color:#111827;">관절인식</button>
            <button id="makePoseBtn" class="btn small" style="background:#f59e0b;color:#111827;">자세 만들기</button>

            <div class="sliderGroup">
              <label for="poseDetectConf">검출</label>
              <input id="poseDetectConf" type="range" min="30" max="95" value="60">
              <span id="poseDetectConfVal" class="sliderVal">60</span>
            </div>
            <div class="sliderGroup">
              <label for="poseTrackConf">추적</label>
              <input id="poseTrackConf" type="range" min="30" max="95" value="60">
              <span id="poseTrackConfVal" class="sliderVal">60</span>
            </div>
            <div class="sliderGroup">
              <label for="poseLineSize">선</label>
              <input id="poseLineSize" type="range" min="1" max="8" value="4">
              <span id="poseLineSizeVal" class="sliderVal">4</span>
            </div>
          </div>
        </div>

        <div id="digitReadout">
          <span class="label">사람 자세</span>
          <span class="value">—</span>
        </div>

        <div id="poseCaptureOverlay" class="poseCaptureOverlay">
          <div class="poseCaptureBox">
            <div class="poseCaptureTitle" id="poseCaptureTitle">자세를 취하세요</div>
            <div class="poseCaptureSub" id="poseCaptureSub">3초 후 자세를 캡쳐합니다.</div>
            <div class="poseCaptureCount" id="poseCaptureCount">3</div>
          </div>
        </div>
      </div>
    </div>

    <div id="rightDivider"></div>

    <div id="rightBottom">
      <div style="font-size:12px;color:#9ca3af;">실행 로그</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<xml id="toolbox" style="display:none">
  <category name="이벤트" colour="#f59e0b">
    <block type="xrobo_start"></block>
  </category>
  <category name="출력" colour="#60a5fa">
    <block type="motor12_dd">
      <field name="M1">20</field>
      <field name="M2">20</field>
      <field name="MS">500</field>
    </block>
    <block type="motor12_in">
      <value name="M1"><shadow type="math_number"><field name="NUM">20</field></shadow></value>
      <value name="M2"><shadow type="math_number"><field name="NUM">20</field></shadow></value>
      <value name="MS"><shadow type="math_number"><field name="NUM">500</field></shadow></value>
    </block>
    <block type="melody">
      <field name="PITCH">C4</field>
      <value name="DUR"><shadow type="math_number"><field name="NUM">200</field></shadow></value>
      <value name="WAIT"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
    </block>
    <block type="led_ctrl">
      <field name="TGT">OUT1</field>
      <field name="MODE">BRIGHT</field>
      <field name="VAL">10</field>
    </block>
  </category>
  <category name="제어" colour="#10b981">
    <block type="controls_repeat_ext">
      <value name="TIMES"><shadow type="math_number"><field name="NUM">3</field></shadow></value>
    </block>
    <block type="wait_seconds">
      <value name="SEC"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
    </block>
  </category>
</xml>

<div id="playOverlay" aria-hidden="true">
  <div id="ovCamWrap">
    <video id="eyesCam" playsinline autoplay muted></video>
    <canvas id="ovGuideCanvas"></canvas>

    <div class="camUi" style="z-index:5;">
      <div class="camToolbar">
        <span class="camBadge">전체화면 실행중</span>
        <button id="ovPoseFindBtn" class="btn small" style="background:#22c55e;color:#111827;">관절인식</button>

        <div class="sliderGroup">
          <label for="ovPoseDetectConf">검출</label>
          <input id="ovPoseDetectConf" type="range" min="30" max="95" value="60">
          <span id="ovPoseDetectConfVal" class="sliderVal">60</span>
        </div>
        <div class="sliderGroup">
          <label for="ovPoseTrackConf">추적</label>
          <input id="ovPoseTrackConf" type="range" min="30" max="95" value="60">
          <span id="ovPoseTrackConfVal" class="sliderVal">60</span>
        </div>
        <div class="sliderGroup">
          <label for="ovPoseLineSize">선</label>
          <input id="ovPoseLineSize" type="range" min="1" max="8" value="4">
          <span id="ovPoseLineSizeVal" class="sliderVal">4</span>
        </div>
      </div>
    </div>

    <div id="overlayDigitBadge">
      <span class="label">사람 자세</span>
      <span class="value">—</span>
    </div>
  </div>
</div>

<div id="poseNameModal" class="nameModal" aria-hidden="true">
  <div class="nameModalCard">
    <h3>이벤트 이름 만들기</h3>
    <p>캡쳐한 자세의 이름을 입력해 주세요.</p>
    <input id="poseNameInput" type="text" placeholder="예: 만세, 왼손들기, 로봇포즈" maxlength="24" />
    <div class="nameModalActions">
      <button id="poseNameCancel" class="btn cancel">취소</button>
      <button id="poseNameOk" class="btn ok">저장</button>
    </div>
  </div>
</div>

<script>
/* ===== Blockly ===== */
class XroboZelosProvider extends Blockly.zelos.ConstantProvider {
  constructor(){ super(); this.ADD_START_HATS = true; }
}
class XroboZelosRenderer extends Blockly.zelos.Renderer {
  constructor(){ super('xrobo_zelos'); }
  makeConstants_(){ return new XroboZelosProvider(); }
}
Blockly.blockRendering.register('xrobo_zelos', XroboZelosRenderer);
const XroboTheme = Blockly.Theme.defineTheme('xrobo_theme', {
  base: Blockly.Themes.Zelos,
  componentStyles: { startHats: true }
});
var ws = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  renderer: 'xrobo_zelos',
  theme: XroboTheme,
  grid: { spacing:20, length:3, colour:'#eee', snap:true },
  zoom: { controls:true, wheel:true, startScale:1, minScale:0.5, maxScale:2 },
  move: { scrollbars:true, drag:true, wheel:true },
  trashcan: true
});

/* ===== 사람 자세 이벤트 ===== */
const BASE_EVENT_OPTIONS = [
  ["정면","P_CENTER"],
  ["왼쪽","P_LEFT"],
  ["오른쪽","P_RIGHT"],
  ["멀리 있음","P_FAR"],
  ["가까이 있음","P_NEAR"]
];

let customPoseEvents = [];
let customPoseCounter = 1;
let lastCapturedPoseForNaming = null;

function sanitizePoseEventName(name){
  name = String(name || '').trim().replace(/\s+/g,' ');
  if(!name) return '';
  return name.slice(0, 24);
}
function makeCustomPoseCode(){
  return 'P_USER_' + String(customPoseCounter++);
}
function getEventDropdownOptions(){
  const arr = BASE_EVENT_OPTIONS.slice();
  customPoseEvents.forEach(p => arr.push([p.name, p.code]));
  return arr.length ? arr : [["정면","P_CENTER"]];
}
function refreshStartBlocksDropdown(){
  if(!ws) return;
  const blocks = ws.getAllBlocks(false);
  const opts = getEventDropdownOptions();
  const validCodes = new Set(opts.map(v => v[1]));
  blocks.forEach(block => {
    if(block.type !== 'xrobo_start') return;
    const field = block.getField('DIGIT');
    if(!field) return;
    field.menuGenerator_ = getEventDropdownOptions;
    const cur = field.getValue();
    if(!validCodes.has(cur)) field.setValue('P_CENTER');
    if(block.rendered) block.render();
  });
}
function addCustomPoseEvent(name, normalizedPose, threshold){
  const cleanName = sanitizePoseEventName(name);
  if(!cleanName || !normalizedPose) return null;

  const dup = customPoseEvents.find(p => p.name === cleanName);
  if(dup){
    dup.pose = normalizedPose;
    dup.threshold = threshold;
    log('♻️ 기존 사용자 자세를 업데이트했습니다: ' + cleanName);
    refreshStartBlocksDropdown();
    return dup;
  }

  const obj = {
    code: makeCustomPoseCode(),
    name: cleanName,
    pose: normalizedPose,
    threshold: isFinite(threshold) ? threshold : 0.18
  };
  customPoseEvents.push(obj);
  refreshStartBlocksDropdown();
  log('✅ 사용자 자세 이벤트 생성: ' + cleanName);
  return obj;
}
function restoreCustomPoseEvents(list){
  customPoseEvents = Array.isArray(list) ? list.map(item => ({
    code: String(item.code || makeCustomPoseCode()),
    name: sanitizePoseEventName(item.name || '사용자자세'),
    pose: item.pose || null,
    threshold: isFinite(item.threshold) ? Number(item.threshold) : 0.18
  })).filter(v => v.name && v.pose) : [];

  let maxN = 0;
  customPoseEvents.forEach(v => {
    const m = /P_USER_(\d+)/.exec(v.code || '');
    if(m) maxN = Math.max(maxN, Number(m[1]) || 0);
  });
  customPoseCounter = maxN + 1;
  refreshStartBlocksDropdown();
}

var PINS_OUT=[["OUT1","OUT1"],["OUT2","OUT2"],["OUT3","OUT3"],["OUT4","OUT4"],["OUT5","OUT5"],["OUT6","OUT6"],["OUT7","OUT7"],["OUT8","OUT8"]];
var SPEEDS=Array.from({length:41},(_,i)=>20-i).map(v=>[String(v),String(v)]);
var TIMES100=Array.from({length:10},(_,i)=>100*(i+1)).map(v=>[String(v),String(v)]);
var LED_TGT=[].concat(PINS_OUT,[["CPU","CPU"]]);
var LED_MODE=[["밝기","BRIGHT"],["숨쉬기","BREATHE"]];
var LED_VALS=Array.from({length:20},(_,i)=>[String(i),String(i)]);

Blockly.Blocks['xrobo_start'] = {
  init: function(){
    this.appendDummyInput()
      .appendField('사람 자세')
      .appendField(new Blockly.FieldDropdown(getEventDropdownOptions), 'DIGIT')
      .appendField('이면');
    this.setNextStatement(true, null);
    this.setColour(36);
    this.setHat('cap');
  }
};

Blockly.defineBlocksWithJsonArray([
  {
    "type":"motor12_dd",
    "message0":"모터 M1 %1  M2 %2  시간 %3 ms",
    "args0":[
      {"type":"field_dropdown","name":"M1","options":SPEEDS},
      {"type":"field_dropdown","name":"M2","options":SPEEDS},
      {"type":"field_dropdown","name":"MS","options":TIMES100}
    ],
    "previousStatement":null,
    "nextStatement":null,
    "inputsInline":true,
    "colour":210
  },
  {
    "type":"motor12_in",
    "message0":"모터 M1 %1  M2 %2  시간 %3 ms",
    "args0":[
      {"type":"input_value","name":"M1","check":"Number"},
      {"type":"input_value","name":"M2","check":"Number"},
      {"type":"input_value","name":"MS","check":"Number"}
    ],
    "previousStatement":null,
    "nextStatement":null,

function numFromInput(parent, name, def){
  if (def===void 0) def=0;
  var raw = Blockly.JavaScript ? Blockly.JavaScript.valueToCode(parent, name, Blockly.JavaScript.ORDER_NONE) : "";
  var n = Number(raw != null ? raw : '');
  return (isFinite(n) ? n : def);
}
function walkNode(b, list){
  if(!b) return;
  switch(b.type){
    case 'motor12_dd':{
      var v1=+b.getFieldValue('M1'), v2=+b.getFieldValue('M2'), ms=+b.getFieldValue('MS');
      list.push({type:'CMD',s:'M12 '+v1+' '+v2+' '+ms});
      if(ms>0) list.push({type:'W',args:[ms]});
      break;
    }
    case 'motor12_in':{
      var v1n=numFromInput(b,'M1',0), v2n=numFromInput(b,'M2',0), msn=numFromInput(b,'MS',0);
      list.push({type:'CMD',s:'M12 '+Math.round(v1n)+' '+Math.round(v2n)+' '+Math.round(msn)});
      if(msn>0) list.push({type:'W',args:[msn]});
      break;
    }
    case 'melody':{
      var p=b.getFieldValue('PITCH'), dur=numFromInput(b,'DUR',200), wait=numFromInput(b,'WAIT',0);
      list.push({type:'CMD',s:'MEL '+p+' '+Math.round(dur)+' '+Math.round(wait)});
      if(wait>0) list.push({type:'W',args:[wait]});
      break;
    }
    case 'led_ctrl':{
      var t=b.getFieldValue('TGT'), m=b.getFieldValue('MODE'), v=+b.getFieldValue('VAL');
      list.push({type:'CMD',s:'LED '+t+' '+m+' '+v});
      break;
    }
    case 'controls_repeat_ext':{
      var times=Math.max(0, numFromInput(b,'TIMES',1));
      var inner=[], first=b.getInputTargetBlock('DO');
      walkChain(first, inner);
      list.push({type:'FOR',count:times,body:inner});
      break;
    }
    case 'wait_seconds':{
      var s=numFromInput(b,'SEC',1);
      if(s>0) list.push({type:'W',args:[s*1000]});
      break;
    }
  }
}
function walkChain(start, list){
  for(var n=start; n; n=n.getNextBlock()) walkNode(n, list);
}
function normalizeProgram(list){
  var out=[];
  for(var i=0;i<list.length;i++){
    var ins=list[i];
    if(ins.type==='CMD'){
      var prev=out[out.length-1];
      if(prev && prev.type==='CMD' && prev.s===ins.s) continue;
    }else if(ins.type==='W'){
      if(!isFinite(ins.args && ins.args[0]) || ins.args[0]<=0) continue;
      var prevw=out[out.length-1];
      if(prevw && prevw.type==='W'){ prevw.args[0]+=ins.args[0]; continue; }
    }
    out.push(ins);
  }
  return out;
}
function buildEventPrograms(){
  const programs = {};
  const opts = getEventDropdownOptions();
  opts.forEach(v => programs[v[1]] = []);

  var evs = ws.getBlocksByType('xrobo_start', true);
  for(var i=0;i<evs.length;i++){
    var code = evs[i].getFieldValue('DIGIT') || 'P_CENTER';
    var chain = evs[i].getNextBlock();
    if(!chain) continue;
    var prog=[]; walkChain(chain, prog);
    var norm = normalizeProgram(prog);
    if(!programs[code]) programs[code] = [];
    programs[code] = programs[code].concat(norm);
  }
  return programs;
}

function resetBleRefs(){ bleDevice=null; bleServer=null; bleService=null; writeChar=null; notifyChar=null; }
function setConnected(v){

function onDisconnected(){
  log('🔌 해제됨');
  setConnected(false);
  resetBleRefs();
}
async function connectBLE(){
  if(!navigator.bluetooth){
    alert('이 브라우저는 Web Bluetooth 미지원입니다.');
    return;
  }
  try{
    const dev = await navigator.bluetooth.requestDevice({
      filters:[{ namePrefix:'XROBO' }],
      optionalServices:[SERVICE_UUID, 0xFFF3, 0xFFF4]
    });
    resetBleRefs();
    bleDevice=dev;
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    bleServer=await bleDevice.gatt.connect();
    bleService=await bleServer.getPrimaryService(SERVICE_UUID);

    try{ writeChar=await bleService.getCharacteristic(0xFFF3);}catch(e){}
    try{ notifyChar=await bleService.getCharacteristic(0xFFF4);}catch(e){}
    if(!writeChar || notifyChar==null){
      const cs=await bleService.getCharacteristics();
      for(const ch of cs){
        const p=ch.properties||{};
        if(!writeChar && (p.write||p.writeWithoutResponse)) writeChar=ch;
        if(!notifyChar && p.notify) notifyChar=ch;
      }
    }
    if(!writeChar) throw new Error('write 특성을 찾지 못했습니다.');

    if(notifyChar){
      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged',function(ev){
        try{
          const v=new TextDecoder().decode(ev.target.value||new Uint8Array());
          log('⬅️ '+v.trim());
        }catch(e){}
      });
    }
    setConnected(true);
    log('✅ 연결: '+(dev.name||'(이름 없음)'));
  }catch(e){
    log('❌ 연결 실패: '+e);
    setConnected(false);
    resetBleRefs();
  }
}
function disconnectBLE(){
  try{ if (bleDevice && bleDevice.gatt) bleDevice.gatt.disconnect(); }catch(e){}
  setConnected(false);
  resetBleRefs();
}
$('connectToggle').onclick = ()=> isConnected ? disconnectBLE() : connectBLE();

function sendRaw(s){
  if(!writeChar){
    log('➡️(BLE 미연결) '+s);
    return Promise.resolve();
  }
  return writeChar.writeValue(enc(s+'\n')).then(()=> log('➡️ '+s)).catch(e=> log('⚠️ 전송 실패: '+e));
}
async function runList(list, localToken){
  for(const ins of list){
    if(localToken !== cancelToken) return;
    if(ins.type==='CMD') await sendRaw(ins.s);
    else if(ins.type==='W') await new Promise(r=>setTimeout(r, ins.args[0]||0));
    else if(ins.type==='FOR'){
      for(let k=0;k<ins.count;k++){
        if(localToken !== cancelToken) return;
        await runList(ins.body, localToken);
      }
    }
  }
}
async function processQueue(localToken){
  if(queueBusy) return;
  queueBusy = true;
  try{
    while(queue.length && localToken === cancelToken){
      const item = queue.shift();
      await runList(item.list, localToken);
    }
  }finally{
    queueBusy = false;
    panelLastDetectTs = 0;
    overlayLastDetectTs = 0;
  }
}
function eventLabelFromCode(code){
  switch(code){
    case 'P_CENTER': return '정면';
    case 'P_LEFT': return '왼쪽';
    case 'P_RIGHT': return '오른쪽';
    case 'P_FAR': return '멀리 있음';
    case 'P_NEAR': return '가까이 있음';
    default:{
      var found = customPoseEvents.find(v => v.code === code);
      return found ? found.name : String(code||'');
    }
  }
}
function triggerEvent(name, conf, source){
  var label = eventLabelFromCode(name);
  if(!isRunning){
    log(`⏸ 실행 중이 아니라 이벤트를 실행하지 않습니다. (${label})`);
    return;
  }
  if(!eventPrograms || !eventPrograms[name]){
    try{ eventPrograms = buildEventPrograms(); }catch(e){}
  }
  var seq = eventPrograms[name];
  if(!seq || !seq.length){
    log(`⚠️ 이벤트 ${label} 에 연결된 블록이 없습니다.`);
    return;
  }
  log(`③ 이벤트 ${label} 실행 (${seq.length}개 명령, ${conf.toFixed(1)}%)`);
  queue.push({list: seq.slice()});
  processQueue(cancelToken);
}

function getVideoDisplayRect(video, canvas){
  const vw = video.videoWidth || 1;
  const vh = video.videoHeight || 1;
  const cw = canvas.clientWidth || 1;
  const ch = canvas.clientHeight || 1;
  const s = Math.max(cw / vw, ch / vh);
  const dw = vw * s;
  const dh = vh * s;
  return { left:(cw-dw)/2, top:(ch-dh)/2, width:dw, height:dh, scale:s };
}
function landmarkToCanvas(video, canvas, lm){
  const rect = getVideoDisplayRect(video, canvas);
  return {
    x: rect.left + (1 - lm.x) * rect.width,
    y: rect.top + lm.y * rect.height,
    visibility: lm.visibility == null ? 1 : lm.visibility
  };
}
function drawPoseOverlay(ctx, canvas, video, poseData, lineWidth){
  ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);
  if(!poseData || !poseData.length) return;

  const pts = poseData.map(lm => landmarkToCanvas(video, canvas, lm));

  ctx.save();
  for (var i=0;i<POSE_CONNECTIONS.length;i++){
    var a = POSE_CONNECTIONS[i][0];
    var b = POSE_CONNECTIONS[i][1];
    var p1 = pts[a], p2 = pts[b];
    var l1 = poseData[a], l2 = poseData[b];
    if(!p1 || !p2 || !l1 || !l2) continue;
    if((l1.visibility||0) < 0.35 || (l2.visibility||0) < 0.35) continue;
    ctx.strokeStyle = 'rgba(34,197,94,.95)';
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  for (var j=0;j<pts.length;j++){
    var p = pts[j], l = poseData[j];
    if(!p || !l) continue;
    if((l.visibility||0) < 0.35) continue;
    ctx.fillStyle = 'rgba(251,191,36,.98)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(2, lineWidth+1), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [15,17],[15,19],[15,21],[16,18],[16,20],[16,22],
  [11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28],
  [27,29],[29,31],[28,30],[30,32]
];

const TEMPLATE_KEYPOINTS = [11,12,13,14,15,16,23,24,25,26,27,28];
function normalizePoseTemplate(poseData){
  if(!poseData || poseData.length < 29) return null;
  const ls = poseData[11], rs = poseData[12], lh = poseData[23], rh = poseData[24];
  if(!ls || !rs || !lh || !rh) return null;

  const shoulderCx = (ls.x + rs.x) / 2;
  const shoulderCy = (ls.y + rs.y) / 2;
  const shoulderDist = Math.hypot(rs.x - ls.x, rs.y - ls.y);
  const hipCx = (lh.x + rh.x) / 2;
  const hipCy = (lh.y + rh.y) / 2;
  const torsoDist = Math.hypot(hipCx - shoulderCx, hipCy - shoulderCy);
  const scale = Math.max(shoulderDist, torsoDist, 0.08);

  const pts = [];
  for(let i=0;i<TEMPLATE_KEYPOINTS.length;i++){
    const idx = TEMPLATE_KEYPOINTS[i];
    const p = poseData[idx];
    if(!p || (p.visibility || 0) < 0.35){
      pts.push(null);
      continue;
    }
    pts.push({
      i: idx,
      x: (p.x - shoulderCx) / scale,
      y: (p.y - shoulderCy) / scale
    });
  }
  return {
    anchor: { x: shoulderCx, y: shoulderCy, scale: scale },
    points: pts
  };
}
function compareNormalizedPose(a, b){
  if(!a || !b || !a.points || !b.points) return null;
  let sum = 0;
  let count = 0;
  for(let i=0;i<a.points.length;i++){
    const p1 = a.points[i];
    const p2 = b.points[i];
    if(!p1 || !p2) continue;
    sum += Math.hypot(p1.x - p2.x, p1.y - p2.y);
    count++;
  }
  if(count < 6) return null;
  return sum / count;
}
function detectCustomPose(poseData){
  if(!customPoseEvents.length || !poseData) return null;
  const cur = normalizePoseTemplate(poseData);
  if(!cur) return null;

  let best = null;
  for(let i=0;i<customPoseEvents.length;i++){
    const item = customPoseEvents[i];
    const d = compareNormalizedPose(cur, item.pose);
    if(d == null) continue;
    const th = isFinite(item.threshold) ? item.threshold : 0.18;
    if(d <= th){
      const conf = clamp(99 - (d / th) * 39, 60, 99);
      if(!best || d < best.distance){
        best = {
          code: item.code,
          label: item.name,
          conf: conf,
          distance: d
        };
      }
    }
  }
  return best;
}

function classifyPosePosition(video, canvas, poseData){
  if(!poseData || poseData.length < 25) return { code:null, label:null, conf:0 };

  var custom = detectCustomPose(poseData);
  if(custom){
    return { code:custom.code, label:custom.label, conf:custom.conf };
  }

  var ls = poseData[11], rs = poseData[12], lh = poseData[23], rh = poseData[24];
  if(!ls || !rs || !lh || !rh) return { code:null, label:null, conf:0 };

  var shoulderMidX = (ls.x + rs.x) / 2;
  var shoulderWidth = Math.abs(rs.x - ls.x);

  if (shoulderWidth > 0.35) {
    return { code:'P_NEAR', label:'가까이 있음', conf:clamp(60 + (shoulderWidth-0.35)*180, 60, 99) };
  }
  if (shoulderWidth < 0.17) {
    return { code:'P_FAR', label:'멀리 있음', conf:clamp(60 + (0.17-shoulderWidth)*260, 60, 99) };
  }

  if (shoulderMidX < 0.42) {
    return { code:'P_LEFT', label:'왼쪽', conf:clamp(60 + (0.42-shoulderMidX)*220, 60, 99) };
  }
  if (shoulderMidX > 0.58) {
    return { code:'P_RIGHT', label:'오른쪽', conf:clamp(60 + (shoulderMidX-0.58)*220, 60, 99) };
  }

  return { code:'P_CENTER', label:'정면', conf:92 };
}

function handlePosePipeline(res, source){
  const prefix = source === 'overlay' ? '[전체화면]' : '[카메라]';
  if(!res || !res.code) return;

  if(source === 'panel') updateDigitReadout(res.label);
  else overlayShowDigit(res.label);

  const now = performance.now();
  const key = res.code;
  const shouldLog = (key !== lastStateKey) || (now - lastLogTs > 1500);
  if(shouldLog){
    lastStateKey = key;
    lastLogTs = now;
    log(`${prefix} ① 사람 자세 인식: ${res.label} (${res.conf.toFixed(1)}%)`);
    log(`${prefix} ② 이벤트 확인중: ${res.label}`);
  }

  if(queueBusy) return;
  triggerEvent(res.code, res.conf, source);
}

function updatePoseOptions(){
  if(!poseModel) return;
  poseModel.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: Number(poseDetectConf.value)/100,
    minTrackingConfidence: Number(poseTrackConf.value)/100
  });
}

async function ensurePoseLoaded(){
  if(poseLoaded) return;
  if(typeof Pose === 'undefined'){
    throw new Error('MediaPipe Pose 로드 실패');
  }
  poseModel = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });
  poseModel.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: Number(poseDetectConf.value)/100,
    minTrackingConfidence: Number(poseTrackConf.value)/100
  });
  poseLoaded = true;
  log('✅ 사람 관절 모델 준비 완료');
}

async function runPoseOnce(video, target){
  if(!poseLoaded || poseBusy) return;
  poseBusy = true;
  try{
    await new Promise(async (resolve, reject)=>{
      poseModel.onResults(function(results){
        try{
          const landmarks = results.poseLandmarks || null;
          if(target === 'panel') currentPose = landmarks;
          else currentPoseOverlay = landmarks;
          resolve();
        }catch(err){
          reject(err);
        }
      });
      try{
        await poseModel.send({image: video});
      }catch(e){
        reject(e);
      }
    });
  } finally {
    poseBusy = false;
  }
}

async function openCameraStream(){
  const candidates = [
    {
      audio:false,
      video:{
        facingMode:{ ideal:'user' },
        width:{ ideal:1280 },
        height:{ ideal:720 }
      }
    },
    {
      audio:false,
      video:{
        facingMode:{ ideal:'environment' },
        width:{ ideal:1280 },
        height:{ ideal:720 }
      }
    },
    { audio:false, video:true }
  ];

  let lastErr = null;
  for(const constraints of candidates){
    try{
      const s = await navigator.mediaDevices.getUserMedia(constraints);
      return s;
    }catch(e){
      lastErr = e;
    }
  }
  throw lastErr || new Error('카메라를 열 수 없습니다.');
}

async function startCam(){
  if(camOn) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    log('❌ 이 브라우저에서는 카메라를 사용할 수 없습니다.');
    alert('이 브라우저에서는 카메라를 사용할 수 없습니다.');
    return;
  }

  try{
    await ensurePoseLoaded();

    const stream = await openCameraStream();
    camStream = stream;

    camVideo.setAttribute('playsinline','true');
    camVideo.muted = true;
    camVideo.autoplay = true;
    camVideo.srcObject = stream;

    try{
      await camVideo.play();
    }catch(e){
      log('⚠️ camVideo.play 재시도');
      await new Promise(r=>setTimeout(r, 200));
      await camVideo.play();
    }

    eyesCam.setAttribute('playsinline','true');
    eyesCam.muted = true;
    eyesCam.autoplay = true;
    eyesCam.srcObject = stream;

    camOn = true;
    updateCamUi();
    updateDigitReadout(null);
    overlayShowDigit(null);
    resizeGuideCanvases();
    startDetectLoop();
    log('🎥 카메라 켜짐');
  }catch(e){
    log('❌ 카메라 실패: ' + (e && e.message ? e.message : e));
    alert('카메라를 열지 못했습니다.\n' + (e && e.message ? e.message : e));
  }
}
function stopCam(){
  if(!camOn) return;
  try{ if(camRAF) cancelAnimationFrame(camRAF); }catch(e){}
  camRAF = null;

  try{ camVideo.pause(); }catch(e){}
  try{ eyesCam.pause(); }catch(e){}

  if(camStream){
    try{ camStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  }

  camVideo.srcObject = null;
  eyesCam.srcObject = null;
  camStream = null;
  camOn = false;
  currentPose = null;
  currentPoseOverlay = null;
  drawPoseOverlay(guideCtx, guideCanvas, camVideo, null, Number(poseLineSize.value));
  drawPoseOverlay(ovGuideCtx, ovGuideCanvas, eyesCam, null, Number(ovPoseLineSize.value));
  updateDigitReadout(null);
  overlayShowDigit(null);
  updateCamUi();
  log('🛑 카메라 꺼짐');
}
camToggle.onclick = ()=> camOn ? stopCam() : startCam();

poseFindBtn.onclick = ()=>{ poseFinding = true; log('🟢 패널 관절인식 시작'); };
ovPoseFindBtn.onclick = ()=>{ poseFindingOverlay = true; log('🟢 전체화면 관절인식 시작'); };

function startDetectLoop(){
  panelLastDetectTs = 0;
  if(camRAF) cancelAnimationFrame(camRAF);

  const step = async ()=>{
    if(!camOn || !camVideo.videoWidth || !camVideo.videoHeight){
      camRAF = requestAnimationFrame(step);
      return;
    }

    drawPoseOverlay(guideCtx, guideCanvas, camVideo, currentPose, Number(poseLineSize.value));

    if(!isFullscreenRun && !queueBusy){
      const now = performance.now();
      if(now - panelLastDetectTs >= PROCESS_MS){
        panelLastDetectTs = now;

        await runPoseOnce(camVideo, 'panel');
        drawPoseOverlay(guideCtx, guideCanvas, camVideo, currentPose, Number(poseLineSize.value));

        if(poseFinding && currentPose){
          poseFinding = false;
          log('🟢 패널 사람 발견');
        }
        if(currentPose && !isCapturingPoseTemplate){
          const pos = classifyPosePosition(camVideo, guideCanvas, currentPose);
          handlePosePipeline(pos, 'panel');
        }else if(!currentPose){
          updateDigitReadout(null);
        }
      }
    }
    camRAF = requestAnimationFrame(step);
  };
  camRAF = requestAnimationFrame(step);
}

/* ===== 사용자 자세 만들기 ===== */
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
function showCaptureOverlay(title, sub, count){
  poseCaptureTitle.textContent = title || '자세를 취하세요';
  poseCaptureSub.textContent = sub || '';
  poseCaptureCount.textContent = count == null ? '' : String(count);
  poseCaptureOverlay.classList.add('show');
}
function hideCaptureOverlay(){
  poseCaptureOverlay.classList.remove('show');
}
function openPoseNameModal(){
  return new Promise((resolve)=>{
    poseNameModal.classList.add('show');
    poseNameModal.setAttribute('aria-hidden', 'false');
    poseNameInput.value = '';
    setTimeout(()=> poseNameInput.focus(), 30);

    function cleanup(val){
      poseNameModal.classList.remove('show');
      poseNameModal.setAttribute('aria-hidden', 'true');
      poseNameOk.removeEventListener('click', onOk);
      poseNameCancel.removeEventListener('click', onCancel);
      poseNameInput.removeEventListener('keydown', onKey);
      resolve(val);
    }
    function onOk(){
      cleanup(sanitizePoseEventName(poseNameInput.value));
    }
    function onCancel(){
      cleanup('');
    }
    function onKey(e){
      if(e.key === 'Enter') onOk();
      else if(e.key === 'Escape') onCancel();
    }

    poseNameOk.addEventListener('click', onOk);
    poseNameCancel.addEventListener('click', onCancel);
    poseNameInput.addEventListener('keydown', onKey);
  });
}
async function createPoseTemplateFlow(){
  if(isCapturingPoseTemplate) return;
  isCapturingPoseTemplate = true;

  try{
    if(!camOn){
      await startCam();
      if(!camOn){
        isCapturingPoseTemplate = false;
        return;
      }
    }

    await ensurePoseLoaded();

    showCaptureOverlay('자세를 취하세요', '3초 후 자세를 캡쳐합니다.', '3');
    log('📸 사용자 자세 만들기 시작');

    await sleep(700);
    showCaptureOverlay('자세를 취하세요', '3초 후 자세를 캡쳐합니다.', '3');
    await sleep(1000);
    showCaptureOverlay('자세를 취하세요', '2초 후 자세를 캡쳐합니다.', '2');
    await sleep(1000);
    showCaptureOverlay('자세를 취하세요', '1초 후 자세를 캡쳐합니다.', '1');
    await sleep(1000);

    await runPoseOnce(camVideo, 'panel');
    drawPoseOverlay(guideCtx, guideCanvas, camVideo, currentPose, Number(poseLineSize.value));

    if(!currentPose){
      hideCaptureOverlay();
      alert('사람 자세를 찾지 못했습니다.\n다시 시도해 주세요.');
      log('⚠️ 사용자 자세 캡쳐 실패: 관절 미검출');
      return;
    }

    const normalized = normalizePoseTemplate(currentPose);
    if(!normalized){
      hideCaptureOverlay();
      alert('자세를 저장하기에 관절 정보가 부족합니다.\n정면에 서서 다시 시도해 주세요.');
      log('⚠️ 사용자 자세 캡쳐 실패: 정규화 불가');
      return;
    }

    lastCapturedPoseForNaming = normalized;
    showCaptureOverlay('찰칵!', '자세를 캡쳐했습니다.', '📸');
    log('📸 사용자 자세 캡쳐 완료');
    await sleep(700);
    hideCaptureOverlay();

    const name = await openPoseNameModal();
    if(!name){
      log('ℹ️ 사용자 자세 저장 취소');
      return;
    }

    const item = addCustomPoseEvent(name, lastCapturedPoseForNaming, 0.18);
    if(item){
      alert('새 자세 이벤트가 만들어졌습니다: ' + item.name);
      eventPrograms = buildEventPrograms();
    }
  }catch(e){
    console.error(e);
    hideCaptureOverlay();
    alert('자세 만들기 중 오류가 발생했습니다.\n' + (e && e.message ? e.message : e));
    log('❌ 사용자 자세 만들기 오류: ' + (e && e.message ? e.message : e));
  }finally{
    isCapturingPoseTemplate = false;
  }
}
makePoseBtn.onclick = ()=> createPoseTemplateFlow();

/* ===== 전체화면 ===== */
let overlayStartedCam = false;
async function startFullRun(){
  if(isRunning) return;
  eventPrograms = buildEventPrograms();
  cancelToken++;
  queue = [];
  isFullscreenRun = true;
  setRunning(true);

  $('playOverlay').classList.add('show');
  try{
    if($('playOverlay').requestFullscreen) await $('playOverlay').requestFullscreen();
  }catch(e){}

  overlayStartedCam = !camOn;
  if(!camOn) await startCam();

  try{
    eyesCam.srcObject = camStream;
    await eyesCam.play();
  }catch(e){}

  startOverlayLoop();
}
async function stopRun(){
  cancelToken++;
  queue = [];
  setRunning(false);
  stopOverlayLoop();
  $('playOverlay').classList.remove('show');
  isFullscreenRun = false;

  try{
    if(document.fullscreenElement) await document.exitFullscreen();
  }catch(e){}

  try{
    if(writeChar) writeChar.writeValue(enc('S\n'));
  }catch(e){}

  if(overlayStartedCam){
    stopCam();
    overlayStartedCam = false;
  }
}
$('testBtn').onclick = ()=>{
  if(isRunning) return;
  eventPrograms = buildEventPrograms();
  cancelToken++;
  queue = [];
  isFullscreenRun = false;
  setRunning(true);
};
$('runToggle').onclick = ()=>{ if(!isRunning) startFullRun(); else stopRun(); };

function startOverlayLoop(){
  overlayLastDetectTs = 0;
  if(overlayRAF) cancelAnimationFrame(overlayRAF);
  overlayShowDigit(null);
  resizeGuideCanvases();

  const loop = async ()=>{
    if(!isRunning || !isFullscreenRun || !eyesCam.videoWidth || !eyesCam.videoHeight){
      overlayRAF = requestAnimationFrame(loop);
      return;
    }

    drawPoseOverlay(ovGuideCtx, ovGuideCanvas, eyesCam, currentPoseOverlay, Number(ovPoseLineSize.value));

    if(!queueBusy){
      const now = performance.now();
      if(now - overlayLastDetectTs >= PROCESS_MS){
        overlayLastDetectTs = now;

        await runPoseOnce(eyesCam, 'overlay');
        drawPoseOverlay(ovGuideCtx, ovGuideCanvas, eyesCam, currentPoseOverlay, Number(ovPoseLineSize.value));

        if(poseFindingOverlay && currentPoseOverlay){
          poseFindingOverlay = false;
          log('🟢 전체화면 사람 발견');
        }
        if(currentPoseOverlay){
          const pos = classifyPosePosition(eyesCam, ovGuideCanvas, currentPoseOverlay);
          handlePosePipeline(pos, 'overlay');
        }else{
          overlayShowDigit(null);
        }
      }
    }
    overlayRAF = requestAnimationFrame(loop);
  };
  overlayRAF = requestAnimationFrame(loop);
}
function stopOverlayLoop(){
  if(overlayRAF) cancelAnimationFrame(overlayRAF);
  overlayRAF = null;
  overlayShowDigit(null);
}
document.addEventListener('fullscreenchange', ()=>{
  applyHeaderHeight();
  resizeGuideCanvases();
  if(isFullscreenRun && !document.fullscreenElement) stopRun();
});
document.addEventListener('keydown', e=>{
  if(isFullscreenRun && e.key === 'Escape') stopRun();
});
$('fsBtn').onclick = async ()=>{
  if(document.fullscreenElement) await document.exitFullscreen();
  else await document.documentElement.requestFullscreen();
};

/* ===== 리사이저 ===== */
(function(){
  const divider = $('rightDivider');
  const root = document.documentElement;
  let dragging=false, startY=0, startH=0, rightH=0;
  function pxToNum(px){ return Number(String(px).replace('px',''))||0; }
  function onDown(e){
    e.preventDefault();
    dragging=true;
    startY=('touches' in e ? e.touches[0].clientY : e.clientY);
    startH=pxToNum(getComputedStyle(root).getPropertyValue('--logH'));
    rightH=$('right').clientHeight;
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive:false});
    window.addEventListener('mouseup', onUp, {once:true});
    window.addEventListener('touchend', onUp, {once:true});
  }
  function onMove(e){
    if(!dragging) return;
    const y=('touches' in e ? e.touches[0].clientY : e.clientY);
    if('touches' in e) e.preventDefault();
    let nh = startH + (startY - y);
    nh = Math.min(Math.max(90, nh), Math.max(130, Math.floor(rightH*0.8)));
    root.style.setProperty('--logH', nh+'px');
  }
  function onUp(){
    dragging=false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
  }
  divider.addEventListener('mousedown', onDown);
  divider.addEventListener('touchstart', onDown, {passive:false});
})();
(function(){
  const res = $('hResizer'), main = $('main'), right = $('right');
  let dragging=false, startX=0, startW=0, maxW=0;
  function clamp2(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function computeMax(){
    const rect = main.getBoundingClientRect();
    const barW = res.getBoundingClientRect().width || 8;
    maxW = Math.max(0, rect.width - barW);
    return maxW;
  }
  function onDown(x){
    dragging=true; startX=x; startW=right.getBoundingClientRect().width; computeMax();
  }
  function applyWidth(newW){
    newW = clamp2(newW, 0, maxW);
    document.documentElement.style.setProperty('--rightW', newW + 'px');
    Blockly.svgResize(ws);
    resizeGuideCanvases();
  }
  function onMove(x){
    if(!dragging) return;
    applyWidth(startW - (x - startX));
  }
  function onUp(){ dragging=false; }

  res.addEventListener('mousedown', e=>{ e.preventDefault(); onDown(e.clientX); });
  window.addEventListener('mousemove', e=> onMove(e.clientX));
  window.addEventListener('mouseup', onUp);

  res.addEventListener('touchstart', e=>{
    if(!e.touches||!e.touches[0]) return;
    e.preventDefault();
    onDown(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchmove', e=>{
    if(!e.touches||!e.touches[0]) return;
    onMove(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchend', onUp);
})();

applyHeaderHeight();
updateCamUi();
resizeGuideCanvases();
syncOverlaySlidersFromPanel();
refreshStartBlocksDropdown();
